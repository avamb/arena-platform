name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Lint — static analysis via golangci-lint
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run golangci-lint
        # v8 of the action installs golangci-lint v2, which is required to
        # parse the v2-format .golangci.yml (the v6 action caps at v1.64.x
        # and fails config verification).
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Test — unit tests with race detector + coverage
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena_secret
          POSTGRES_DB: arena_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://arena:arena_secret@localhost:5432/arena_test?sslmode=disable
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # Job 3: OpenAPI check — verify generated code matches spec
  # ─────────────────────────────────────────────────────────────────
  openapi-check:
    name: OpenAPI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Node.js (for npx)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate OpenAPI types
        run: make gen-openapi

      - name: Check for drift
        run: |
          if ! git diff --exit-code apps/backend/internal/adapters/http/openapi/types_gen.go; then
            echo "::error::Generated OpenAPI types are out of sync with openapi.yaml."
            echo "::error::Run 'make gen-openapi' locally and commit the result."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 4: Build & Push — Docker image (only on push to master)
  #
  # Release branch: master (single production release branch). See
  # deploy/DOKPLOY.md §13 "Release branch & image tag strategy" for the
  # documented tag plan: every push to master publishes
  #   - <short-sha>   (immutable, used by Dokploy for pinned deploys)
  #   - latest        (mutable, tracks the tip of master)
  # Required GitHub secrets: REGISTRY_URL, REGISTRY_USERNAME, REGISTRY_PASSWORD.
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    # packages: write lets the GHCR fallback below publish with the
    # built-in GITHUB_TOKEN when no REGISTRY_* secrets are configured.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Explicit REGISTRY_URL / REGISTRY_USERNAME / REGISTRY_PASSWORD
      # secrets take precedence (see deploy/DOKPLOY.md §13.2). Without
      # them the job falls back to GitHub Container Registry using the
      # built-in GITHUB_TOKEN, so the pipeline publishes out of the box.
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL != '' && secrets.REGISTRY_URL || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD != '' && secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_URL != '' && format('{0}/arena-api', secrets.REGISTRY_URL) || format('ghcr.io/{0}/arena-api', github.repository_owner) }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Job 5: Widget — Svelte 5 custom element (arena-tickets)
  #
  # Runs on every push/PR (additive; does not gate build-and-push).
  # Steps: install → unit tests (vitest) → build → size gate (<150 KB gzip).
  # ─────────────────────────────────────────────────────────────────
  widget:
    name: Widget
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: apps/widget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/widget/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Size gate (<150 KB gzip)
        run: npm run size

      # ── WCAG 2.2 AA gate: axe-core + keyboard E2E via Playwright ───────────
      # Mirrors the ops/accessibility gate used for the WP plugin.
      # Runs after build so dist/v1/arena-tickets.js exists for the demo server.
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: E2E tests — axe-core WCAG 2.2 AA + keyboard navigation
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-widget
          path: apps/widget/playwright-report/
          retention-days: 14

      - name: Upload widget artifact
        uses: actions/upload-artifact@v4
        with:
          name: arena-tickets-widget-v1
          path: apps/widget/dist/v1/
          retention-days: 30

      # Publish to GitHub Release on master push.
      # Chosen path: GH Release (tag: widget-v1, rolling) rather than
      # extending build-and-push, because the widget is a static asset
      # not a Docker image. The rolling tag widget-v1 always points to the
      # latest v1 build; CDN (e.g. jsDelivr) can pin to a commit SHA.
      - name: Publish to GitHub Release (master only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-v1
          name: "Arena Tickets Widget v1 (latest)"
          prerelease: false
          make_latest: false
          files: |
            apps/widget/dist/v1/arena-tickets.js
            apps/widget/dist/v1/iframe.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # Job 6: Widget Acceptance — real-backend Palác Akropolis E2E
  #
  # Boots a Postgres + Redis service container, builds the Go backend,
  # runs migrations + arena-seed + Akropolis SQL seed, starts arena-api,
  # builds the widget, then runs Playwright against the proxy server
  # (serve-demo-real.cjs) so no page.route() mocks intercept /v1/* calls.
  #
  # WID-R3 (feature #332): real acceptance E2E against compose backend.
  # ─────────────────────────────────────────────────────────────────
  widget-acceptance:
    name: Widget Acceptance (real backend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena_secret
          POSTGRES_DB: arena_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://arena:arena_secret@localhost:5432/arena_e2e?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
      JWT_SIGNING_SECRET: ci-test-jwt-secret-at-least-32-bytes-long

    defaults:
      run:
        working-directory: apps/widget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Go binaries
        working-directory: .
        run: |
          go build -o /tmp/arena-migrate ./apps/backend/cmd/arena-migrate
          go build -o /tmp/arena-seed    ./apps/backend/cmd/arena-seed
          go build -o /tmp/arena-api     ./apps/backend/cmd/arena-api

      - name: Run database migrations
        working-directory: .
        run: /tmp/arena-migrate up

      - name: Seed base fixtures (arena-seed)
        working-directory: .
        run: /tmp/arena-seed

      - name: Seed Palác Akropolis E2E fixture
        working-directory: .
        run: |
          psql "$DATABASE_URL" -f apps/widget/scripts/seed-palac-e2e.sql

      - name: Start arena-api in background
        working-directory: .
        run: |
          /tmp/arena-api > /tmp/arena-api.log 2>&1 &
          ARENA_PID=$!
          echo "ARENA_PID=${ARENA_PID}" >> "$GITHUB_ENV"
          echo "arena-api started with PID ${ARENA_PID}"

      - name: Wait for arena-api to be healthy
        working-directory: .
        run: |
          # Block until /healthz returns HTTP 200 (up to 30 s).
          # Exit 1 if the backend never comes up so subsequent E2E steps
          # don't race against an unavailable backend.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "arena-api is healthy after ${i}s"
              exit 0
            fi
            echo "Waiting for arena-api... (${i}/30)"
            sleep 1
          done
          echo "ERROR: arena-api failed to become healthy within 30 seconds"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/widget/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build widget
        run: npm run build

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: E2E tests — real backend acceptance (WID-R3)
        run: npm run test:e2e:real
        env:
          ARENA_API_URL: http://localhost:8080

      - name: Upload Playwright report (acceptance)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-widget-acceptance
          path: apps/widget/playwright-report/
          retention-days: 14

      - name: Upload arena-api logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arena-api-logs
          path: /tmp/arena-api.log
          retention-days: 7
