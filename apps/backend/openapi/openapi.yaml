          in: path
          required: true
          description: Two-letter ISO 3166-1 alpha-2 country code (e.g. "IL")
          schema:
            type: string
            minLength: 2
            maxLength: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeoUpdateCountryRequest"
      responses:
        "200":
          description: Country updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoCountryResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the geo.admin permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Country not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or geo queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/admin/geo/cities:
    post:
      operationId: postV1AdminGeoCities
