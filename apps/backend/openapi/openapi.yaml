            format: uuid
      responses:
        "200":
          description: Reservation cancelled and capacity released.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationCancelEnvelope"
        "400":
          description: |
            `id` is not a valid UUID (`reservation.invalid_id`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
