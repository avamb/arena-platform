  /v1/checkout/{id}/price-breakdown:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Checkout session UUID.
    get:
      operationId: getCheckoutPriceBreakdown
      summary: Itemised price breakdown for a checkout session
      description: |
        Returns the itemised price breakdown (subtotal, discounts, fees,
        taxes, total) sourced from the pricing snapshot persisted on the
        checkout session. Requires the session to have transitioned to
        `pricing_confirmed` — otherwise returns 409
        `checkout.pricing_not_confirmed`.

        Compliance: EU and IL consumer-protection law require the
        all-in price (including taxes and fees) to be displayed to the
        buyer before payment.

        Requires JWT + the `checkout.read` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Price breakdown returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceBreakdownEnvelope"
        "400":
          description: |
            Path id is not a UUID (`checkout.invalid_id`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `checkout.read` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Checkout session not found (`checkout.not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Pricing snapshot is not populated yet — the session has
            not been confirmed (`checkout.pricing_not_confirmed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error (`checkout.get_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Checkout queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/checkout/{id}/confirm:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Checkout session UUID.
    post:
      operationId: confirmCheckoutSession
      summary: Lock in the pricing snapshot for a checkout session
      description: |
        Re-quotes the pricing using the current pricing pipeline
        (`ComputePricing` in `pricing.go`), persists the resulting
        snapshot on the session, and transitions
        `created` → `pricing_confirmed`. When `promo_code` is supplied
        the handler resolves and validates it; failures surface the
        promo state-machine error codes (`promo.not_found`,
        `promo.not_active`, `promo.expired`, etc.).

        Requires JWT + the `checkout.confirm` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmCheckoutRequest"
            examples:
              confirmFixedTier:
                summary: Confirm a fixed-price tier without a promo
                value:
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  tier_id: "018f4f00-0000-7000-8000-000000000020"
                  session_id: "018f4f00-0000-7000-8000-000000000021"
                  quantity: 2
              confirmFixedTierWithPromo:
                summary: Confirm a fixed-price tier with a promo code
                value:
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  tier_id: "018f4f00-0000-7000-8000-000000000020"
                  session_id: "018f4f00-0000-7000-8000-000000000021"
                  quantity: 1
                  promo_code: "SUMMER25"
              confirmPwywTier:
                summary: Confirm a pay-what-you-want tier (chosen_price required)
                value:
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  tier_id: "018f4f00-0000-7000-8000-000000000022"
                  session_id: "018f4f00-0000-7000-8000-000000000021"
                  quantity: 1
                  chosen_price: 1500
      responses:
        "200":
          description: Pricing confirmed; session is now in `pricing_confirmed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionEnvelope"
        "400":
          description: |
            Invalid body or field. Possible error codes:
            `checkout.invalid_id`, `checkout.invalid_body`,
            `checkout.empty_body`, `checkout.invalid_json`,
            `checkout.invalid_tier_id`,
            `checkout.invalid_session_id`,
            `checkout.invalid_org_id`,
            `checkout.invalid_quantity`,
            `checkout.chosen_price_required`,
            `checkout.invalid_chosen_price`,
            `checkout.chosen_price_below_min`,
            `checkout.chosen_price_above_max`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `checkout.confirm` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            Ticket tier not found (`checkout.tier_not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Session is not in the `created` state, so the
            `created → pricing_confirmed` transition is rejected
            (`checkout.invalid_transition`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Promo code resolved but failed validation. Possible codes
            propagated from the promo state machine: `promo.not_found`,
            `promo.not_active`, `promo.not_yet_valid`, `promo.expired`,
            `promo.invalid_order_amount`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error. Possible codes:
            `checkout.tier_lookup_failed`,
            `checkout.promo_lookup_failed`,
            `checkout.unknown_pricing_mode`,
            `checkout.confirm_failed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Required dependency unavailable. Possible codes:
            `dependency.database_unavailable`,
            `dependency.tier_unavailable`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/checkout/{id}/complete:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Checkout session UUID.
    post:
      operationId: completeCheckoutSession
      summary: Mark a checkout session as completed
      description: |
        Completes a previously confirmed checkout session. Two completion
        modes are supported:

        * **Paid path** (`total > 0`): `payment_intent_id` and
          `payment_provider` are both required. Transitions
          `pricing_confirmed` → `completed`.
        * **Free path** (`total = 0`): body may be empty. Tickets are
          issued immediately and email delivery jobs are enqueued.

        Requires JWT + the `checkout.complete` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteCheckoutRequest"
            examples:
              completePaid:
                summary: Complete a paid checkout
                value:
                  payment_intent_id: "pi_3OqQ6vJk9z2c1abc"
                  payment_provider: "stripe"
              completeFree:
                summary: Complete a free checkout (empty body)
                value: {}
      responses:
        "200":
          description: Session completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionEnvelope"
        "400":
          description: |
            Invalid body or missing required payment field. Possible
            error codes: `checkout.invalid_id`,
            `checkout.invalid_body`, `checkout.invalid_json`,
            `checkout.missing_payment_intent`,
            `checkout.missing_payment_provider`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `checkout.complete` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            State machine rejected the transition. Possible codes:
            `checkout.invalid_transition` (session not in
            `pricing_confirmed`), `checkout.payment_required`
            (free path attempted on a session with `total > 0`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error (`checkout.complete_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or checkout queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/checkout/{id}/abandon:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Checkout session UUID.
    post:
      operationId: abandonCheckoutSession
      summary: Abandon a checkout session
      description: |
        Transitions any non-terminal state → `abandoned`. Idempotent
        in spirit: re-abandoning a session that is already terminal
        returns 409 `checkout.already_terminal`.

        Requires JWT + the `checkout.abandon` permission.
      tags: [v1]
      security:
        - bearerAuth: []
