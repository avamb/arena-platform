      operationId: postV1AdminOrganizationsOrgIdMembers
      summary: Admin — add a member to an organization
      description: |
        Grants a role to a user within an organization. Supply exactly one of
        user_id or email — when email is supplied the user is resolved via
        GetUserByEmail; a missing user yields HTTP 422
        admin_membership.user_not_found. Requires JWT + membership.grant +
        X-Admin-Reason.
