  /v1/organizations:
    post:
      operationId: postV1Organizations
      summary: Create a new organization
      description: |
        Creates a new organization (primary tenant boundary). Requires JWT authentication
        and the "org.create" permission. Name and slug must be unique among active
        (non-deleted) organizations.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
