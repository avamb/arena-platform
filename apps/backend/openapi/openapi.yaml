    patch:
      operationId: updateWebhookSubscriber
      summary: Update a WordPress webhook subscriber (event_types / active)
      description: |
        Mutates one or both of the subscriber's `event_types` filter and
        its `active` flag. The signing_secret is intentionally NOT
        rotatable here — it is write-only and is returned exactly once
        at registration time. To rotate, deactivate and re-register.

        Backs the SuperAdmin webhooks admin UI (Feature #294 — S-3).

        Requires JWT + the `webhook.subscriber.manage` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Subscriber UUID (primary key of `webhook_subscribers.id`).
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                event_types:
                  type: array
                  items: { type: string }
                  description: |
                    Replace the event_types filter. Empty array switches
                    the subscriber back to wildcard (receives every event).
                active:
                  type: boolean
                  description: |
                    Pause (`false`) or resume (`true`) delivery to this
                    subscriber. Re-activates a previously soft-deleted row.
            examples:
              activate:
                summary: Re-activate a paused subscriber
                value: { active: true }
              retype:
                summary: Narrow an existing subscriber to two event types
                value: { event_types: ["order_paid", "ticket_issued"] }
      responses:
        "200":
          description: Updated subscriber summary (no signing_secret).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriberSummary"
        "400":
          description: |
            Invalid UUID, empty body, or unknown JSON fields
            (`bad_request` / `validation_error`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `webhook.subscriber.manage` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: No subscriber row matches `{id}` (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while updating the row (`internal_error`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Webhook subscriber queries or pool unavailable
            (`service_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deactivateWebhookSubscriber
      summary: Deactivate (soft-delete) a WordPress webhook subscriber
      description: |
        Flips `active` to `false` on the row identified by `{id}`.
        The row itself is RETAINED for audit purposes;
        `ListActiveWebhookSubscribers` simply stops returning it
        and the dispatcher stops sending events to its
        `callback_url`.

        Requires JWT + the `webhook.subscriber.manage` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
