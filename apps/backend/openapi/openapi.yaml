          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/checkout/quote:
    get:
      operationId: getCheckoutQuote
      summary: Compute an itemized pricing quote for a checkout selection
      description: |
        Returns an itemized pricing breakdown for a ticket-tier selection
        (feature #129). The handler:

          1. Looks up the ticket tier (returns 404 `pricing.tier_not_found`
             if missing).
          2. Resolves the unit price from the tier's `pricing_mode`:
             - `free`  → `unit_price = 0`.
             - `fixed` → `unit_price = tier.price_amount`.
             - `pwyw`  → `unit_price = chosen_price` (required, must lie
               within `[pwyw_min, pwyw_max]` when configured).
          3. Optionally looks up and validates the promo code against the
             subtotal (`subtotal = unit_price * quantity`) using
             `validatePromoCode`. Failed validations short-circuit with
             422 + the relevant `promo.*` code.
          4. Runs the deterministic pricing pipeline (`ComputePricing`)
             with the server's `PricingRules` (`PlatformFeeRate`,
             `ProviderFeeRate`, `TaxRate`, all in basis points).
          5. Emits a structured audit log entry (`pricing: quote computed`)
             and returns the itemized quote envelope.

        All monetary fields are integer cents. The pipeline guarantees
        `(subtotal - discount) + platform_fee + provider_fee + tax == total`.
        Permission: `pricing.quote` (requires JWT).

        Documented under feature #269 (Wave A-8: pricing endpoint group).
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: tier_id
          in: query
          required: true
          description: UUID of the ticket tier.
          schema:
            type: string
            format: uuid
        - name: session_id
          in: query
          required: true
          description: UUID of the session that owns the tier.
          schema:
            type: string
            format: uuid
        - name: quantity
          in: query
          required: true
          description: Number of tickets (integer >= 1).
          schema:
            type: integer
            format: int32
            minimum: 1
        - name: org_id
          in: query
          required: true
          description: UUID of the organization (for promo-code lookup).
          schema:
            type: string
            format: uuid
        - name: promo_code
          in: query
          required: false
          description: |
            Optional promo code string to apply. When present the handler
            performs the full `validatePromoCode` state-machine check;
            failures surface as 422 with a `promo.*` error code
            (`promo.not_found`, `promo.not_active`, `promo.not_yet_valid`,
            `promo.expired`, `promo.invalid_order_amount`,
            `promo.exhausted`, `promo.per_customer_limit`).
          schema:
            type: string
        - name: chosen_price
          in: query
          required: false
          description: |
            Buyer-chosen price in cents. Required and validated only for
            tiers with `pricing_mode = pwyw`; ignored otherwise. Must be
            a non-negative integer and (when configured on the tier)
            within `[pwyw_min, pwyw_max]`.
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        "200":
          description: Itemized pricing quote.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponseEnvelope"
              examples:
                quoteFixedTier:
                  summary: "Fixed-price tier, 2 tickets, no promo"
                  value:
                    quote:
                      unit_price: 5000
                      quantity: 2
                      subtotal: 10000
                      discount: 0
                      platform_fee: 500
                      provider_fee: 200
                      tax: 0
                      total: 10700
                      currency: "USD"
                      tier_id: "018f4f00-0000-7000-8000-000000000004"
                      session_id: "018f4f00-0000-7000-8000-000000000001"
                      promo_code: null
                quoteFixedTierWithPromo:
                  summary: "Fixed-price tier, 1 ticket, 10% promo applied"
                  value:
                    quote:
                      unit_price: 5000
                      quantity: 1
                      subtotal: 5000
                      discount: 500
                      platform_fee: 225
                      provider_fee: 90
                      tax: 0
                      total: 4815
                      currency: "USD"
                      tier_id: "018f4f00-0000-7000-8000-000000000004"
                      session_id: "018f4f00-0000-7000-8000-000000000001"
                      promo_code: "SUMMER10"
                quotePwywTier:
                  summary: "Pay-what-you-want tier, buyer chose 7500 cents"
                  value:
                    quote:
                      unit_price: 7500
                      quantity: 1
                      subtotal: 7500
                      discount: 0
                      platform_fee: 375
                      provider_fee: 150
                      tax: 0
                      total: 8025
                      currency: "USD"
                      tier_id: "018f4f00-0000-7000-8000-000000000005"
                      session_id: "018f4f00-0000-7000-8000-000000000001"
                      promo_code: null
                quoteFreeTier:
                  summary: "Free tier, 3 tickets, zero everything"
                  value:
                    quote:
                      unit_price: 0
                      quantity: 3
                      subtotal: 0
                      discount: 0
                      platform_fee: 0
                      provider_fee: 0
                      tax: 0
                      total: 0
                      currency: "USD"
                      tier_id: "018f4f00-0000-7000-8000-000000000006"
                      session_id: "018f4f00-0000-7000-8000-000000000001"
                      promo_code: null
        "400":
          description: |
            Missing or invalid query parameters. Possible error codes:
            `pricing.missing_params`, `pricing.invalid_tier_id`,
            `pricing.invalid_session_id`, `pricing.invalid_org_id`,
            `pricing.invalid_quantity`, `pricing.chosen_price_required`,
            `pricing.invalid_chosen_price`, `pricing.chosen_price_below_min`,
            `pricing.chosen_price_above_max`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `pricing.quote` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Ticket tier not found (`pricing.tier_not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Promo code rejected by the validate-promo state machine.
            Possible error codes: `promo.not_found`, `promo.not_active`,
            `promo.not_yet_valid`, `promo.expired`,
            `promo.invalid_order_amount`, `promo.exhausted`,
            `promo.per_customer_limit`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error. Possible codes:
            `pricing.tier_lookup_failed`, `pricing.promo_lookup_failed`,
            `pricing.unknown_pricing_mode`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or tier queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/reservations:
    post:
      operationId: createReservation
      summary: Create a draft reservation that holds capacity
      description: |
        Creates a draft reservation. The reservation TTL is resolved
        using the precedence
        `sales_channels.reservation_ttl_override ->
        organizations.reservation_ttl_seconds -> 1200 s default`.
        In the same transaction the handler calls `ReserveCapacity`
        against the session inventory ledger row; the call returns
        409 `reservation.over_capacity` when there is insufficient
        available capacity.

        Requires JWT + the `reservation.create` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
            examples:
              createGAReservation:
                summary: Hold 2 GA seats on a session (no tier)
                value:
                  session_id: "018f4f00-0000-7000-8000-000000000001"
                  channel_id: "018f4f00-0000-7000-8000-000000000002"
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  quantity: 2
              createTierReservation:
                summary: Hold 4 seats on a specific ticket tier
                value:
                  session_id: "018f4f00-0000-7000-8000-000000000001"
                  channel_id: "018f4f00-0000-7000-8000-000000000002"
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  tier_id: "018f4f00-0000-7000-8000-000000000004"
                  quantity: 4
      responses:
        "201":
          description: Reservation created in `draft` state.
          content:
            application/json:
              schema:
