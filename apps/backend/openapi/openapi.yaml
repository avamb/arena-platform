  # ────────────────────────────────────────────────────────────────────────
  # Sessions group — feature #126, documented under Wave A-3 (feature #264).
  # Backed by apps/backend/internal/platform/httpserver/sessions.go and
  # mounted by mount_catalog.go.
  # ────────────────────────────────────────────────────────────────────────

  /v1/organizations/{org_id}/events/{event_id}/sessions:
    post:
      operationId: createSession
      summary: Create a new session (time slot) for an event
      description: |
        Creates a new session under an event. The owning organization is
        taken from the path; the body MUST NOT repeat it. `end_at` must
        be strictly after `start_at`. `capacity_total` must be > 0.
        Overlapping sessions are permitted but flagged in the response
        via `session.has_overlapping_sessions`. The handler also
        initialises the inventory ledger for the new session (non-fatal
        on failure). Requires JWT + the `session.create` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the parent event.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            examples:
              minimal:
                summary: Minimal session
                value:
                  start_at: "2026-08-15T18:00:00Z"
                  end_at: "2026-08-15T21:00:00Z"
                  capacity_total: 500
              scheduled:
                summary: Scheduled session with explicit status
                value:
                  start_at: "2026-09-01T19:00:00Z"
                  end_at: "2026-09-01T22:30:00Z"
                  capacity_total: 1200
                  status: "scheduled"
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEnvelope"
        "400":
          description: |
            Body invalid or required fields missing. Possible error codes:
            `session.invalid_body`, `session.empty_body`,
            `session.invalid_json`, `session.invalid_status`,
            `session.missing_start_at`, `session.invalid_start_at`,
            `session.missing_end_at`, `session.invalid_end_at`,
            `session.invalid_date_range`, `session.invalid_capacity`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `session.create` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`session.insert_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or session queries unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: listSessions
      summary: List all active sessions for an event
      description: |
        Returns all non-deleted sessions belonging to the given event.
        Detects overlaps among the returned set at the application layer
        and reports the result via the top-level
        `has_overlapping_sessions` boolean. Requires JWT + the
        `session.read` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the parent event.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of sessions for the event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `session.read` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`session.list_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or session queries unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/events/{event_id}/sessions/{id}:
    get:
      operationId: getSession
      summary: Fetch a single session by ID
      description: |
        Returns one session by ID, scoped to the parent event. Requires
        JWT + the `session.read` permission.
      tags: [v1]
      security:
