  /v1/payment-intents/{id}/transition:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Payment intent UUID.
    post:
      operationId: transitionPaymentIntent
      summary: Drive the payment intent state machine
      description: |
        Validates the requested state transition against the state
        machine, then persists the new state. Transitioning to
        `requires_action` requires `sca_redirect_url`. Transitioning
        from a terminal state returns 409 `payment_intent.terminal_state`;
        invalid transitions return 409 `payment_intent.invalid_transition`.

        Requires JWT + the `payment_intent.update` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionPaymentIntentRequest"
            examples:
              transitionToProcessing:
                summary: Begin processing after a `created` intent
                value:
                  state: "processing"
                  provider_payment_id: "pi_3OqQ6vJk9z2c1abc"
              transitionToRequiresAction:
                summary: Park the intent waiting for 3DS challenge
                value:
                  state: "requires_action"
                  sca_redirect_url: "https://hooks.stripe.com/3d_secure_2/hosted?merchant=acct_X"
                  client_secret: "pi_3OqQ6vJk9z2c1abc_secret_X"
              transitionToSucceeded:
                summary: Mark a processing intent as succeeded
                value:
                  state: "succeeded"
              transitionToFailed:
                summary: Mark a processing intent as failed with diagnostics
                value:
                  state: "failed"
                  failure_code: "card_declined"
                  failure_message: "Your card was declined."
      responses:
        "200":
          description: State transition applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentEnvelope"
        "400":
          description: |
            Invalid body or field. Possible error codes:
            `payment_intent.invalid_id`, `payment_intent.invalid_body`,
            `payment_intent.empty_body`,
            `payment_intent.invalid_json`,
            `payment_intent.missing_state`,
            `payment_intent.missing_sca_redirect_url`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `payment_intent.update` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Payment intent not found (`payment_intent.not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Transition not valid from the current state, or the intent
            is already in a terminal state
            (`payment_intent.invalid_transition`,
            `payment_intent.terminal_state`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error (`payment_intent.fetch_failed`,
            `payment_intent.transition_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or payment intent queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/payment-intents/webhook:
    post:
      operationId: paymentIntentWebhook
      summary: Provider webhook ingestion
      description: |
        Provider-side webhook endpoint. **Unauthenticated** — providers
        deliver from their own infrastructure and authenticate via
        HMAC / signature headers (e.g. `Stripe-Signature`); signature
        verification is performed inside the handler (or a deployment
        edge proxy) prior to parsing.

        Idempotency: each `(provider_payment_id, event_type)` pair is
        recorded in `payment_intent_events` with a UNIQUE constraint.
        Duplicate deliveries return `204 No Content` without
        reprocessing. Unknown event types are acknowledged with
        `processed: false`. When the resulting state would advance an
        already-terminal intent the response is `200` with
        `processed: false` and a `reason` string.

        No bearer token is required; this endpoint is excluded from
        every server permission. The `payment_intent.create` permission
        documented elsewhere does not apply.
      tags: [v1]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentWebhookRequest"
            examples:
              succeeded:
                summary: Stripe-shaped `payment_intent.succeeded` callback
                value:
                  provider_payment_id: "pi_3OqQ6vJk9z2c1abc"
                  event_type: "payment_intent.succeeded"
              failed:
                summary: Stripe-shaped `payment_intent.payment_failed` callback
                value:
                  provider_payment_id: "pi_3OqQ6vJk9z2c1abc"
                  event_type: "payment_intent.payment_failed"
                  failure_code: "card_declined"
                  failure_message: "Your card was declined."
              mockShorthand:
                summary: Mock-provider shorthand alias
                value:
                  provider_payment_id: "pi_mock_0001"
                  event_type: "mock.succeeded"
      responses:
        "200":
          description: |
            Webhook acknowledged. `processed: true` means the state
            machine advanced; `processed: false` means the event was
            recognised but no transition was performed
            (unknown event type, terminal intent, invalid transition).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentWebhookAck"
        "204":
          description: |
            Duplicate webhook delivery — the
            `(provider_payment_id, event_type)` pair was already
            recorded. No body.
        "400":
          description: |
            Invalid body. Possible error codes: `webhook.invalid_body`,
            `webhook.empty_body`, `webhook.invalid_json`,
            `webhook.missing_provider_payment_id`,
            `webhook.missing_event_type`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            No payment intent matches `provider_payment_id`
