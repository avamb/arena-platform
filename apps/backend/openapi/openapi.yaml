  /v1/webhooks/subscribers/{id}/recent-deliveries:
    get:
      operationId: listRecentWebhookDeliveries
      summary: Recent outbox events for a webhook subscriber (admin UI)
      description: |
        Returns the most recent outbox rows whose `event_type` would be
        delivered to this subscriber. When the subscriber's
        `event_types` filter is empty, the wildcard branch is taken and
        every event_type is considered; otherwise the listing is
        restricted to the subscriber's typed list.

        The persisted per-subscriber delivery row does NOT exist today
        (see `08_architecture/06_event_notifications_billing_reporting_ru.md`),
        so `attempts` and `dispatched_at` reflect the aggregate
        dispatcher state on the source outbox event row rather than
        this subscriber specifically. The panel is therefore labelled
        as best-effort in the admin UI.

        Backs the SuperAdmin webhooks admin UI (Feature #294 — S-3).

        Requires JWT + the `webhook.subscriber.manage` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Subscriber UUID (primary key of `webhook_subscribers.id`).
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Up to 50 most recent matching outbox rows, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [subscriber_id, wildcard, event_types, attempts, total]
                properties:
                  subscriber_id:
                    type: string
                    format: uuid
                  wildcard:
                    type: boolean
                    description: True when `event_types` is empty.
                  event_types:
                    type: array
                    items: { type: string }
                  attempts:
                    type: array
                    items:
                      type: object
                      required: [event_id, event_type, occurred_at, attempts]
                      properties:
                        event_id:
                          type: string
                          format: uuid
                        event_type:
                          type: string
                        occurred_at:
                          type: string
                          format: date-time
                        dispatched_at:
                          type: string
                          format: date-time
                          description: |
                            Omitted entirely when the source outbox row
                            has not yet been dispatched (the platform's
                            documented-omission idiom instead of `null`).
                        attempts:
                          type: integer
                          format: int32
                  total:
                    type: integer
                    format: int32
        "400":
          description: |
            `{id}` is not a valid UUID (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `webhook.subscriber.manage` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: No subscriber row matches `{id}` (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while listing deliveries (`internal_error`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Webhook subscriber queries or pool unavailable
            (`service_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ───────────────────────────────────────────────────────────────────
  # Event publications (feature #151, mounted by mountPublicationRoutes
  # in apps/backend/internal/platform/httpserver/mount_catalog.go and
  # implemented in apps/backend/internal/platform/httpserver/publications.go).
  #
  # Endpoint matrix:
  #   GET    /v1/events/{event_id}/publications                       publication.read
  #   POST   /v1/events/{event_id}/publications                       publication.create
  #   DELETE /v1/events/{event_id}/publications/{feed_token_id}       publication.delete
  #
  # POST is idempotent (ON CONFLICT DO NOTHING — re-publishing the
  # same {event,feed} pair returns 200 with the existing row).
  # DELETE is idempotent (unpublishing a non-existent entry returns
  # 204 No Content — the desired state is already achieved).
  # ───────────────────────────────────────────────────────────────────
  /v1/events/{event_id}/publications:
    get:
      operationId: listEventPublications
      summary: List feed tokens an event is published to
      description: |
        Returns every `event_publications` row attached to the given
        event, regardless of city scope. Requires JWT + the
        `publication.read` permission.

        Implemented by `handleListPublications` in
        `apps/backend/internal/platform/httpserver/publications.go`.
        The response envelope wraps the rows in a `publications`
        array — the field name is stable across schema evolution so
        future pagination metadata can be added alongside without
        breaking clients.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the event to list publications for.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Zero or more publication rows for the event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPublicationListResponse"
              examples:
                empty:
                  summary: Event has not yet been published anywhere
                  value:
                    publications: []
                global:
                  summary: Event published to one global feed
                  value:
                    publications:
                      - id: "01929d0e-0e47-7000-8000-000000000c01"
                        event_id: "01929d0e-0e47-7000-8000-0000000000e1"
                        feed_token_id: "01929d0e-0e47-7000-8000-0000000000f1"
                        city_id: null
                        published_at: "2026-06-30T12:00:00Z"
                scoped:
                  summary: Event published to two feeds, one city-scoped
                  value:
                    publications:
                      - id: "01929d0e-0e47-7000-8000-000000000c02"
                        event_id: "01929d0e-0e47-7000-8000-0000000000e2"
                        feed_token_id: "01929d0e-0e47-7000-8000-0000000000f2"
                        city_id: null
                        published_at: "2026-06-30T12:01:00Z"
                      - id: "01929d0e-0e47-7000-8000-000000000c03"
                        event_id: "01929d0e-0e47-7000-8000-0000000000e2"
                        feed_token_id: "01929d0e-0e47-7000-8000-0000000000f3"
                        city_id: "01929d0e-0e47-7000-8000-0000000000d1"
                        published_at: "2026-06-30T12:02:00Z"
        "400":
          description: |
            `event_id` is not a valid UUID
            (`publication.invalid_event_id`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `publication.read` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while listing publications
            (`publication.internal`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: publishEvent
      summary: Publish an event to an agent feed token
      description: |
        Idempotently creates an `event_publications` row linking
        the event to a feed token. Re-publishing the same
        `{event_id, feed_token_id}` pair returns 200 with the
        existing row (the underlying SQL uses
        `ON CONFLICT DO NOTHING` + a follow-up select). Requires
        JWT + the `publication.create` permission.

        Implemented by `handlePublishEvent` in
        `apps/backend/internal/platform/httpserver/publications.go`.
        `city_id` in the request body is optional — omit it (or
        pass `null`) for a global publication visible in every
        geography.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the event being published.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishEventRequest"
            examples:
              global:
                summary: Publish to a single feed, no city scope
                value:
                  feed_token_id: "01929d0e-0e47-7000-8000-0000000000f1"
              scoped:
                summary: Publish to a feed and scope to one city
                value:
                  feed_token_id: "01929d0e-0e47-7000-8000-0000000000f3"
                  city_id: "01929d0e-0e47-7000-8000-0000000000d1"
      responses:
        "200":
          description: |
            Publication row created (or, when the
            `{event_id, feed_token_id}` pair already existed, the
            pre-existing row is returned with the same envelope
            shape — `POST` is idempotent).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPublication"
              examples:
                created:
                  summary: New global publication
                  value:
                    id: "01929d0e-0e47-7000-8000-000000000c01"
                    event_id: "01929d0e-0e47-7000-8000-0000000000e1"
                    feed_token_id: "01929d0e-0e47-7000-8000-0000000000f1"
                    city_id: null
                    published_at: "2026-06-30T12:00:00Z"
                scopedCreated:
                  summary: New city-scoped publication
                  value:
                    id: "01929d0e-0e47-7000-8000-000000000c03"
                    event_id: "01929d0e-0e47-7000-8000-0000000000e2"
                    feed_token_id: "01929d0e-0e47-7000-8000-0000000000f3"
                    city_id: "01929d0e-0e47-7000-8000-0000000000d1"
                    published_at: "2026-06-30T12:02:00Z"
        "400":
          description: |
            Validation failed. Possible codes:
            `publication.invalid_event_id`,
            `publication.body_required`,
            `publication.invalid_json`,
            `publication.feed_token_id_required`,
            `publication.invalid_feed_token_id`,
            `publication.invalid_city_id`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `publication.create` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: |
            `Content-Type` header is not `application/json`
            (`publication.content_type_required`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while inserting the publication
            row (`publication.internal`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/events/{event_id}/publications/{feed_token_id}:
    delete:
      operationId: unpublishEvent
      summary: Unpublish an event from a feed token
      description: |
        Removes the `event_publications` row linking the event to
        the feed token. Idempotent — when no matching row exists
        the handler still returns 204 No Content, since the
        desired state (the event is not published to this feed)
        is already achieved. Requires JWT + the
        `publication.delete` permission.

        Implemented by `handleUnpublishEvent` in
        `apps/backend/internal/platform/httpserver/publications.go`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the event being unpublished.
          schema:
            type: string
            format: uuid
        - name: feed_token_id
          in: path
          required: true
          description: UUIDv7 of the feed token to unpublish from.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: |
            Publication row deleted (or already absent — DELETE is
            idempotent). The response body is empty.
        "400":
          description: |
            `event_id` or `feed_token_id` is not a valid UUID
            (`publication.invalid_event_id`,
            `publication.invalid_feed_token_id`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `publication.delete` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while deleting the row
            (`publication.internal`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/media:
    post:
      operationId: postV1Media
      summary: Upload a media object (Wave G — feature #286)
      description: |
        Streams a single multipart upload into the configured storage backend
        (s3|local) and records the metadata in the `media_objects` table.
        Returns the created `media_object` (without `signed_url`; call
        `GET /v1/media/{id}` to obtain a signed download URL).
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, owner_type]
              properties:
                file:
                  type: string
                  format: binary
                owner_type:
                  type: string
                  enum: [org_logo, event_poster, artist_photo]
                owner_id:
                  type: string
                  format: uuid
                org_id:
                  type: string
                  format: uuid
                content_type:
                  type: string
      responses:
        "201":
          description: Media object created.
          content:
            application/json:
              schema:
                type: object
                required: [media_object]
                properties:
                  media_object:
                    $ref: "#/components/schemas/MediaObject"
        "400":
          description: Multipart parse error, missing file part, invalid owner_type/owner_id/org_id, or empty upload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `media.write` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Media storage backend is not configured (MEDIA_BACKEND unset).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/media/{id}:
    get:
      operationId: getV1MediaByID
      summary: Fetch media metadata + signed download URL (Wave G — feature #286)
      description: |
        Returns the media object record plus a short-lived signed URL the
        caller can use to fetch the bytes. For the s3 backend the URL is
        an S3 presigned GET URL; for the local backend it points at
        `/v1/media-files/{id}` carrying `expires` + `sig` query
        parameters that the public download endpoint validates.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the media_objects row to fetch.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media metadata with short-lived signed download URL.
          content:
            application/json:
              schema:
                type: object
                required: [media_object]
                properties:
                  media_object:
                    $ref: "#/components/schemas/MediaObject"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `media.read` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Media object not found or already soft-deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Media storage backend is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteV1MediaByID
      summary: Soft-delete a media object (Wave G — feature #286)
      description: |
        Sets `deleted_at = now()` on the row. The underlying bytes remain in
        the storage backend until the `media-gc` worker job reclaims them
        (default retention: 7 days).
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the media_objects row to soft-delete.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Soft-delete succeeded.
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `media.delete` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Media object not found or already soft-deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Media storage backend is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/media-files/{id}:
    get:
      operationId: getV1MediaFile
      summary: Download media bytes via a signed URL (Wave G — feature #286)
      description: |
        Public endpoint — no JWT. Authorization is supplied via the
        `expires` and `sig` query parameters issued by `GET /v1/media/{id}`.
        For the s3 backend this endpoint is unused (clients follow the S3
        presigned URL directly); for the local backend it is the only way
        to stream the bytes back to a consumer.
      tags: [v1]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the media_objects row whose bytes are being streamed.
          schema:
            type: string
            format: uuid
        - name: expires
          in: query
          required: true
          description: Unix-seconds expiry timestamp embedded in the signed URL.
          schema:
            type: integer
            format: int64
        - name: sig
          in: query
          required: false
          description: HMAC-SHA256 signature over `id:expires`. Required in production; optional in dev when no MEDIA_SIGNING_SECRET is set.
          schema:
            type: string
      responses:
        "200":
          description: Streaming response carrying the stored bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid media id or missing expires parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Signature mismatch or signed URL expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Media object not found or bytes already reclaimed by the GC worker.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Media storage backend is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
