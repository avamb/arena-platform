  /v1/admin/impersonate:
    post:
      operationId: postV1AdminImpersonate
      summary: Issue a scoped impersonation JWT (feature #167)
      description: |
        Platform superadmins can issue a short-lived JWT that acts as a target
        user, enabling diagnosis of user-specific issues without sharing credentials.

        Every issuance is audit-logged (action="impersonation.issue",
        resource_type="user", resource_id=<user_id>). The returned token carries
        extra JWT claims ("impersonated_by", "impersonation_reason") so all
        downstream audit entries can tag the real actor.

        Constraints:
          - Requires superadmin.read permission (platform_superadmin / admin role).
          - Token lifetime is capped at 30 minutes (1800 seconds).
          - user_id must be a valid UUID.
          - reason is mandatory (human-readable business justification).

        Only available when ENABLE_DEV_AUTH=true (foundation milestone).
      tags: [v1, admin, superadmin, impersonation]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpersonateRequest"
      responses:
        "200":
          description: Impersonation token issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpersonateResponse"
        "400":
          description: |
            Validation error — missing or invalid user_id, missing reason,
            or duration_seconds exceeds 1800.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the superadmin.read permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token mint failed (internal error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Dev auth stub not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ───────────────────────────────────────────────────────────────────────────
  # Events — feature #125 / Wave A-2 documentation (feature #263)
  #
  # Permissions:
  #   GET  /v1/events                                        event.read (shared)
  #   GET  /v1/events/{id}                                   event.read (shared)
  #   GET  /v1/organizations/{org_id}/events                 event.read
  #   POST /v1/organizations/{org_id}/events                 event.create
  #   PATCH  /v1/organizations/{org_id}/events/{id}          event.update (owner)
  #   POST   /v1/organizations/{org_id}/events/{id}/status   event.publish (owner)
  #   DELETE /v1/organizations/{org_id}/events/{id}          event.delete (owner)
  #
  # All endpoints return the standard ErrorEnvelope on errors. The Accept-
  # Language header (and ?lang= override) drives locale resolution for the
  # `name` / `description` fields. Localizable writes are accepted via the
  # `translations` map on create / update bodies (see EventTranslations).
  # ───────────────────────────────────────────────────────────────────────────

  /v1/events:
    get:
      operationId: listEvents
      summary: List public events across all organizations
      description: |
        Returns active events across the platform. Defaults to
        `?visibility=public`; pass `?visibility=all` to include private and
        unlisted events. The `name` / `description` fields are localized per
        Accept-Language / ?lang=. Requires JWT + the `event.read` permission
        (shared read-only).
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: visibility
          in: query
          required: false
          description: |
            Visibility filter. One of `public` (default), `private`,
            `unlisted`, or `all` (no filter).
          schema:
            type: string
            enum: [public, private, unlisted, all]
        - name: lang
          in: query
          required: false
          description: |
            BCP-47 locale override for `name` / `description` translations.
            Falls back to Accept-Language, then to the server default.
          schema:
            type: string
      responses:
        "200":
          description: Array of events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
        "400":
          description: Unsupported `visibility` query parameter value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks `event.read`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Event queries unavailable (database not wired).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

