  /v1/checkout/promo-validate:
    post:
      operationId: validatePromoCode
      summary: Validate a promo code and compute its discount
      description: |
        Validates a promo code against a candidate order and returns
        the computed discount when applicable. Validation steps:

          1. Look up the code by `(org_id, code)` -- missing returns 404
             `promo.not_found`.
          2. Check status, validity window and `min_order_amount` --
             returns 422 with one of `promo.not_active`,
             `promo.not_yet_valid`, `promo.expired`,
             `promo.invalid_order_amount`.
          3. Enforce `max_uses` globally -- exhausted returns 409
             `promo.exhausted`.
          4. When `user_id` is a valid UUID, enforce
             `max_uses_per_customer` -- exceeded returns 409
             `promo.per_customer_limit`.

        Requires JWT + the `promo.validate` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidatePromoCodeRequest"
            examples:
              validateAnonymous:
                summary: Validate without an authenticated buyer
                value:
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  code: "SUMMER25"
                  order_amount: 10000
              validateForUser:
                summary: Validate enforcing the per-customer cap
                value:
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  code: "WELCOME10"
                  order_amount: 5000
                  user_id: "018f4f00-0000-7000-8000-000000000099"
      responses:
        "200":
          description: Promo code is valid for the order; discount returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatePromoCodeResponse"
        "400":
          description: |
            Invalid body or field. Possible error codes:
            `promo.invalid_body`, `promo.empty_body`,
            `promo.invalid_json`, `promo.invalid_code`,
            `promo.invalid_org_id`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `promo.validate` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Promo code not found (`promo.not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Redemption cap reached. Possible codes:
            `promo.exhausted`, `promo.per_customer_limit`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Promo cannot be applied to this order. Possible codes:
            `promo.not_active`, `promo.not_yet_valid`, `promo.expired`,
            `promo.invalid_order_amount`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error. Possible codes:
            `promo.lookup_failed`, `promo.count_failed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Promo queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

