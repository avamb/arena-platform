                    total: 0
                oneWildcard:
                  summary: One subscriber receiving every event type
                  value:
                    subscribers:
                      - subscriber_id: "01929d0e-0e47-7000-8000-000000000b01"
                        site_url: "https://wp1.example.com"
                        callback_url: "https://wp1.example.com/wp-json/arena-events/v1/webhook"
                        event_types: []
                        active: true
                        created_at: "2026-06-30T12:00:00Z"
                    total: 1
                twoTyped:
                  summary: Two subscribers with explicit event type filters
                  value:
                    subscribers:
                      - subscriber_id: "01929d0e-0e47-7000-8000-000000000b01"
                        site_url: "https://wp1.example.com"
                        callback_url: "https://wp1.example.com/wp-json/arena-events/v1/webhook"
                        event_types: ["order_paid", "ticket_issued"]
                        active: true
                        created_at: "2026-06-30T12:00:00Z"
                      - subscriber_id: "01929d0e-0e47-7000-8000-000000000b02"
                        site_url: "https://wp2.example.com"
                        callback_url: "https://wp2.example.com/wp-json/arena-events/v1/webhook"
                        event_types: ["refund_succeeded"]
                        active: true
                        created_at: "2026-06-30T12:01:00Z"
                    total: 2
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `webhook.subscriber.manage` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while listing subscribers
            (`internal_error`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Webhook subscriber queries unavailable
            (`service_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: registerWebhookSubscriber
      summary: Register a new WordPress webhook subscriber
      description: |
        Creates a new entry in `webhook_subscribers`, generates a
        cryptographically-random 64-character lowercase hex
        HMAC-SHA256 signing secret, persists it in
        `webhook_subscribers.signing_secret`, and returns it in the
        response body. The secret is returned EXACTLY ONCE and
        cannot be recovered via any subsequent endpoint.

        `callback_url` is unique across active subscribers — a
        duplicate registration returns `409 conflict`. When
        `site_url` is absent or empty, the server copies
        `callback_url` into that field. When `event_types` is absent
        or `null`, the server normalises it to the empty array
        (wildcard — receive every event type).

        Requires JWT + the `webhook.subscriber.manage` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWebhookSubscriberRequest"
            examples:
              wildcardMinimal:
                summary: Minimal — only `callback_url`, wildcard event types
                value:
                  callback_url: "https://wp1.example.com/wp-json/arena-events/v1/webhook"
              typedFull:
                summary: Full registration with explicit event filters
                value:
                  site_url: "https://wp2.example.com"
                  callback_url: "https://wp2.example.com/wp-json/arena-events/v1/webhook"
                  event_types: ["order_paid", "ticket_issued", "refund_succeeded"]
              singleEvent:
                summary: Subscriber that only wants `refund_succeeded`
                value:
                  site_url: "https://wp3.example.com"
                  callback_url: "https://wp3.example.com/wp-json/arena-events/v1/webhook"
                  event_types: ["refund_succeeded"]
      responses:
        "201":
          description: |
            Subscriber registered. The response body contains the
            `signing_secret` — store it immediately, it is NOT
            recoverable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterWebhookSubscriberResponse"
              examples:
                wildcardCreated:
                  summary: Wildcard subscriber created
                  value:
                    subscriber_id: "01929d0e-0e47-7000-8000-000000000b01"
                    site_url: "https://wp1.example.com/wp-json/arena-events/v1/webhook"
                    callback_url: "https://wp1.example.com/wp-json/arena-events/v1/webhook"
                    event_types: []
                    active: true
                    signing_secret: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
                typedCreated:
                  summary: Typed subscriber created
                  value:
                    subscriber_id: "01929d0e-0e47-7000-8000-000000000b02"
                    site_url: "https://wp2.example.com"
                    callback_url: "https://wp2.example.com/wp-json/arena-events/v1/webhook"
                    event_types: ["order_paid", "ticket_issued", "refund_succeeded"]
                    active: true
                    signing_secret: "fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"
        "400":
          description: |
            Invalid body or missing required field. Possible error
            codes: `bad_request` (invalid JSON), `validation_error`
            (callback_url is required).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `webhook.subscriber.manage` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            `callback_url` already registered against another active
            subscriber row (`conflict`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while registering the subscriber
            (`internal_error` — secret generation failed or DB write
            failed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Webhook subscriber queries or pool unavailable
            (`service_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/webhooks/subscribers/{id}:
