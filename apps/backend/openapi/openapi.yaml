              schema:
                type: object
                required: [venue]
                properties:
                  venue:
                    $ref: "#/components/schemas/VenueItem"
        "400":
          description: Body missing/invalid or city_id malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.update)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            Venue not found, has been soft-deleted, or is owned by a different
            organization (owner gate resolves to 404).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: New name conflicts with another active venue in the same org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Semantically invalid V-1 field — currently emitted when the
            `timezone` value is not a recognised IANA time zone name
            (Go `time.LoadLocation` rejects it). The response uses
            the standard `ErrorEnvelope` with
            `error.code = "venue.invalid_timezone"` and
            `error.details.field = "timezone"`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or venue queries unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteV1OrganizationsOrgIdVenuesId
      summary: Soft-delete a venue owned by the organization
      description: |
        Marks the venue as deleted (sets deleted_at = now()) and writes an
        audit event inside the same transaction. Owner-gated: non-owner
        requests resolve to 404. Requires JWT authentication and the
        "venue.delete" permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: UUIDv7 of the venue to soft-delete
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Venue soft-deleted successfully
          content:
            application/json:
              schema:
                type: object
                required: [venue, deleted]
                properties:
                  venue:
                    $ref: "#/components/schemas/VenueItem"
                  deleted:
                    type: boolean
                    example: true
        "400":
          description: id or org_id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.delete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            Venue not found, already soft-deleted, or owned by a different
            organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or venue queries unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ─────────────────────────────────────────────────────────────────────────
  # Payment provider configs — feature #237
  # ─────────────────────────────────────────────────────────────────────────

  /v1/organizations/{org_id}/payment-configs:
    get:
      operationId: listPaymentProviderConfigs
      summary: List payment provider configs for an organization
      description: |
        Returns every active payment_provider_configs row belonging to the
        org in the path. Secrets are never included; only the keys with a
        non-empty value are surfaced through `secret_fields_set`. Requires
        the `payment_config.read` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of payment provider configs
          content:
            application/json:
              schema:
                type: object
                required: [payment_configs]
                properties:
                  payment_configs:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaymentProviderConfigItem"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createPaymentProviderConfig
      summary: Create a new payment provider config
      description: |
        Inserts a new payment_provider_configs row. The (org_id, provider,
        mode) tuple must be unique among active rows — 409 is returned
        otherwise. Status is derived automatically from the supplied secrets
        against the provider's required-secret catalogue. Requires the
        `payment_config.write` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentProviderConfigRequest"
      responses:
        "201":
          description: Config created
          content:
            application/json:
              schema:
                type: object
                required: [payment_config]
                properties:
                  payment_config:
                    $ref: "#/components/schemas/PaymentProviderConfigItem"
        "400":
          description: Invalid body, missing/invalid provider, mode, or public_config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: A config for (org_id, provider, mode) already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/payment-configs/{id}:
    get:
      operationId: getPaymentProviderConfig
      summary: Get one payment provider config by id
      description: |
        Returns the matching active config row. 404 when the row does not
        exist, was soft-deleted, or belongs to a different organization.
        Requires `payment_config.read`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Config row
          content:
            application/json:
              schema:
                type: object
                required: [payment_config]
                properties:
                  payment_config:
                    $ref: "#/components/schemas/PaymentProviderConfigItem"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found or owned by another org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updatePaymentProviderConfig
      summary: Partially update a payment provider config
      description: |
        Patches the config in place. The `secrets` map is a per-key patch:
        non-empty values overwrite, empty-string values delete the secret,
        omitted keys are left untouched. The `status` column is recomputed
        from the post-patch secrets jsonb. Requires `payment_config.write`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentProviderConfigRequest"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                type: object
                required: [payment_config]
                properties:
                  payment_config:
                    $ref: "#/components/schemas/PaymentProviderConfigItem"
        "400":
          description: Invalid body or invalid public_config jsonb
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found or owned by another org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deletePaymentProviderConfig
      summary: Soft-delete a payment provider config
      description: |
        Marks the config deleted (sets deleted_at = now()) and writes an
        audit event inside the same transaction. Requires
        `payment_config.write`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Config soft-deleted
          content:
            application/json:
              schema:
                type: object
                required: [payment_config, deleted]
                properties:
                  payment_config:
                    $ref: "#/components/schemas/PaymentProviderConfigItem"
                  deleted:
                    type: boolean
                    example: true
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found or owned by another org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ─────────────────────────────────────────────────────────────────────────
  # Operator-network admin endpoints (features #208–#210)
  # ─────────────────────────────────────────────────────────────────────────

  /v1/operator-networks:
    get:
      operationId: listOperatorNetworks
      summary: List non-archived operator networks
      description: |
        Returns every operator network whose status is not `archived`.
        Requires the `network.read` permission (bound to platform_superadmin,
        network_operator, and admin per migration 0044_network_permissions.sql).
      tags: [v1, networks]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of active operator networks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorNetworkListResponse"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller does not hold the `network.read` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createOperatorNetwork
      summary: Create a new operator network
      description: |
        Creates a new operator_network row. Requires the `network.create`
        permission, which migration 0044_network_permissions.sql binds only
        to platform_superadmin and the legacy admin role.

        SAUI-09: the caller must supply an `X-Admin-Reason` header; the
        trimmed value is stamped into the audit_events metadata under
        `reason` so the immutable audit trail records why the network
        was created. Missing/empty reason returns 400
        `superadmin.missing_reason`.
      tags: [v1, networks]
      security:
        - bearerAuth: []
      parameters:
        - name: X-Admin-Reason
          in: header
          required: true
          description: |
            SAUI-09 audit-reason header. The trimmed value is stamped
            into the audit_events metadata under `reason` so the
            immutable audit trail records why each network mutation
            was performed. A missing or empty header is rejected with
            HTTP 400 `superadmin.missing_reason`.
          schema:
            type: string
            minLength: 1
            example: "Onboarding Acme network for 2026 season"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperatorNetworkRequest"
      responses:
        "201":
          description: Operator network created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorNetworkEnvelope"
        "400":
          description: |
            Missing/invalid body, name, or slug; or missing/empty
            `X-Admin-Reason` header (`superadmin.missing_reason`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller does not hold the `network.create` permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: An active operator network with that slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

