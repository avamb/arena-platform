  /v1/tickets/{id}/credential:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Ticket UUID whose credential to fetch (or lazily issue).
      - name: type
        in: query
        required: false
        schema:
          type: string
          enum:
            - static_qr
            - pdf
          default: static_qr
        description: |
          Credential type to retrieve. Defaults to `static_qr` when
          absent. Pinned to the `ticket_credentials_type_check`
          constraint in 0027_ticket_credentials.sql.
    get:
      operationId: getTicketCredential
      summary: Fetch (lazy-issue) a ticket credential
      description: |
        Returns the bearer credential for the given ticket and type.
        If no credential exists yet for the `(ticket_id, type)` pair,
        the handler generates one on first access and stores it in
        `ticket_credentials` before responding.

        Credential body (`payload`):

          - `static_qr` — 64-char lowercase hex token (32 bytes from
            crypto/rand). The token itself is NOT the ticket UUID;
            scanners must resolve the token server-side.
          - `pdf` — standard base64-encoded PDF document bytes
            (PDF/1.4, Helvetica). The PDF embeds a freshly generated
            QR token; if both static_qr and pdf credentials are
            needed, issue static_qr first so they share a token.

        Requires JWT + the `credential.read` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Credential payload for the ticket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketCredentialItem"
              examples:
                staticQR:
                  summary: static_qr credential
                  value:
                    id: "01929d0e-0e47-7000-8000-000000000901"
                    ticket_id: "01929d0e-0e47-7000-8000-000000000801"
                    type: "static_qr"
                    payload: "8d3b1c9a4f7e6a2c5d8b3f1e9c7a4d6b2f8e1c5a7d9b3e6f2a4c8d1b5e7f9a3c"
                    issued_at: "2026-06-30T12:00:00Z"
                    revoked_at: null
                pdf:
                  summary: pdf credential (payload truncated for brevity)
                  value:
                    id: "01929d0e-0e47-7000-8000-000000000902"
                    ticket_id: "01929d0e-0e47-7000-8000-000000000801"
                    type: "pdf"
                    payload: "JVBERi0xLjQKMSAwIG9iago8PCAvVHlwZSAvQ2F0YWxvZyAvUGFnZXMgMiAwIFIgPj4KZW5kb2JqCg=="
                    issued_at: "2026-06-30T12:00:00Z"
                    revoked_at: null
                revoked:
                  summary: A previously-issued credential that has been revoked
                  value:
                    id: "01929d0e-0e47-7000-8000-000000000903"
                    ticket_id: "01929d0e-0e47-7000-8000-000000000802"
                    type: "static_qr"
                    payload: "a1b2c3d4e5f6071829304a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d"
                    issued_at: "2026-06-30T12:00:00Z"
                    revoked_at: "2026-06-30T13:00:00Z"
        "400":
          description: |
            Validation failure. Possible error codes:
            `credential.invalid_ticket_id` (path id is not a UUID),
            `credential.invalid_type` (query `?type=` is neither
            `static_qr` nor `pdf`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `credential.read` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while reading, generating, or storing
            the credential. Possible error codes:
            `credential.fetch_failed`, `credential.generation_failed`,
            `credential.store_failed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Credential queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/refunds:
    post:
      operationId: createRefund
      summary: Create a refund request
      description: |
        Creates a new refund row in the `requested` state. The handler
        looks up the parent payment intent to copy `org_id`; a missing
        payment intent returns 404 `refund.payment_intent_not_found`.
        Amount may be less than the payment-intent amount (partial
        refund); the approval handler routes partial refunds whose
        linked tickets are not all `active` to `manual_review`.

        Requires JWT + the `refund.create` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRefundRequest"
            examples:
              createFull:
                summary: Full refund with a customer-facing reason
                value:
                  payment_intent_id: "018f4f00-0000-7000-8000-000000000040"
                  amount: 5000
                  currency: "USD"
                  reason: "Buyer cancelled order"
                  requested_by: "admin:018f4f00-0000-7000-8000-000000000001"
              createPartial:
                summary: Partial refund (amount < payment intent amount)
                value:
                  payment_intent_id: "018f4f00-0000-7000-8000-000000000041"
                  amount: 1200
                  currency: "EUR"
                  reason: "Goodwill credit for one ticket"
      responses:
        "201":
          description: Refund created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundEnvelope"
        "400":
          description: |
            Invalid body or field. Possible error codes:
            `refund.invalid_body`, `refund.empty_body`,
            `refund.invalid_json`,
            `refund.invalid_payment_intent_id`,
            `refund.invalid_amount`, `refund.missing_currency`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `refund.create` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            Parent payment intent not found
            (`refund.payment_intent_not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error (`refund.pi_lookup_failed`,
            `refund.create_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool, refund queries, or payment intent queries
            unavailable (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

