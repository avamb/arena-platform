  /v1/refunds/{id}/approve:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Refund UUID.
    post:
      operationId: approveRefund
      summary: Approve a refund request
      description: |
        Approves a refund in the `requested` state. Standard path
        transitions `requested → approved → provider_pending`
        (simulating provider submission). When the refund is partial
        AND the payment intent has a checkout session AND at least one
        ticket is not in `active` status, the refund instead
        transitions directly to `manual_review` for admin resolution.
        Approving a refund that is not in `requested` returns 409
        `refund.invalid_state`.

        Requires JWT + the `refund.approve` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRefundRequest"
            examples:
              approveNoNotes:
                summary: Approve without notes (empty body)
                value: {}
              approveWithNotes:
                summary: Approve with admin notes
                value:
                  notes: "Customer contacted support; full refund authorized."
      responses:
        "200":
          description: |
            Refund transitioned to `provider_pending` (or
            `manual_review` for partial refunds with non-active
            tickets).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundEnvelope"
        "400":
          description: |
            Invalid body or path id. Possible error codes:
            `refund.invalid_id`, `refund.invalid_body`,
            `refund.invalid_json`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `refund.approve` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Refund not found (`refund.not_found`).
          content:
