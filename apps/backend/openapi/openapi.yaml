  /v1/organizations/{org_id}/events/{event_id}/sessions/{session_id}/tiers:
    post:
      operationId: createTicketTier
      summary: Create a ticket tier (pricing option) under a session
      description: |
        Creates a new ticket tier under the given session. The owning
        organization, event, and session are taken from the path; the body
        MUST NOT repeat them. `name` and `pricing_mode` are required.
        Pricing-mode invariants:

          free  — `price_amount` is forced to 0.
          fixed — `price_amount` must be > 0 (cents).
          pwyw  — when both `pwyw_min` and `pwyw_max` are provided,
                  `pwyw_min <= pwyw_max`.

        `currency` defaults to `USD` when omitted. Requires JWT + the
        `tier.create` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the parent event.
          schema:
            type: string
            format: uuid
        - name: session_id
          in: path
          required: true
          description: UUIDv7 of the parent session.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketTierRequest"
            examples:
              fixed:
                summary: Fixed-price General Admission tier
                value:
                  name: "General Admission"
                  pricing_mode: "fixed"
                  price_amount: 2500
                  currency: "USD"
                  sort_order: 0
              free:
                summary: Free RSVP tier
                value:
                  name: "Free RSVP"
                  pricing_mode: "free"
                  sort_order: 1
              pwyw:
                summary: Pay-what-you-want tier with bounds
                value:
                  name: "Supporter"
                  pricing_mode: "pwyw"
                  currency: "USD"
                  pwyw_min: 500
                  pwyw_max: 10000
                  sort_order: 2
      responses:
        "201":
          description: Ticket tier created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketTierEnvelope"
        "400":
          description: |
            Body invalid or required fields missing. Possible error codes:
            `tier.invalid_body`, `tier.empty_body`, `tier.invalid_json`,
            `tier.missing_name`, `tier.missing_pricing_mode`,
            `tier.invalid_pricing_mode`, `tier.invalid_capacity`,
            `tier.invalid_sale_window_start`,
            `tier.invalid_sale_window_end`, `tier.invalid_sale_window`,
            and the pricing-mode validators from the catalog domain layer
            (e.g. `tier.invalid_price_amount`, `tier.invalid_pwyw_bounds`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `tier.create` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`tier.insert_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or tier queries unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
