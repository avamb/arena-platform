              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateSession
      summary: Partially update a session
      description: |
        Applies a partial update to a session. Omitted / empty fields
        leave existing values unchanged. When `status` changes, the
        transition is validated against the state machine and an HTTP
        422 `session.invalid_transition` envelope is returned for
        disallowed moves. When `capacity_total` changes, the capacity
        propagation hook fires to keep the inventory ledger in sync.
        Requires JWT + the `session.update` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the parent event.
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: UUIDv7 of the session.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
            examples:
              capacityBump:
                summary: Bump capacity (fires inventory propagation hook)
                value:
                  capacity_total: 750
              schedule:
                summary: Transition draft to scheduled
                value:
                  status: "scheduled"
              reschedule:
                summary: Reschedule the time window
                value:
                  start_at: "2026-08-16T19:00:00Z"
                  end_at: "2026-08-16T22:00:00Z"
      responses:
        "200":
          description: Updated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEnvelope"
        "400":
          description: |
            Body invalid or fields out of range. Possible error codes:
            `session.invalid_body`, `session.empty_body`,
            `session.invalid_json`, `session.invalid_status`,
            `session.invalid_start_at`, `session.invalid_end_at`,
            `session.invalid_date_range`, `session.invalid_capacity`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `session.update` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Session not found (`session.not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Status transition not allowed by the state machine. The
            response uses the standard `ErrorEnvelope` with
            `error.code = "session.invalid_transition"` and
            `error.details.current_status` /
            `error.details.target_status`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`session.update_failed`, `session.get_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or session queries unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteSession
      summary: Soft-delete a session
      description: |
        Soft-deletes a session (sets `deleted_at = now()`) and writes a
        `v1.session.delete` audit event inside the same transaction.
