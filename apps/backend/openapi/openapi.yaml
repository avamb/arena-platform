          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/events/{event_id}/sessions/{session_id}/inventory/reserve:
    post:
      operationId: reserveInventory
      summary: Reserve capacity units on the session-level ledger row
      description: |
        Atomically reserves `quantity` capacity units against the
        session-level inventory ledger row. Uses `SELECT ... FOR UPDATE`
        in a CTE to enforce the
        `capacity_held + capacity_sold + quantity <= capacity_total`
        invariant. Returns 409 `inventory.over_capacity` when the request
        would exceed available capacity. Requires JWT + the
        `inventory.reserve` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the parent event.
          schema:
            type: string
            format: uuid
        - name: session_id
          in: path
          required: true
          description: UUIDv7 of the parent session.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryQuantityRequest"
            examples:
              reserveTwo:
                summary: Reserve 2 capacity units
                value:
                  quantity: 2
              reserveTen:
                summary: Reserve 10 capacity units (bulk hold)
                value:
                  quantity: 10
      responses:
        "200":
          description: |
            Capacity successfully reserved; the envelope wraps the updated
            inventory ledger row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryEnvelope"
        "400":
          description: |
            Body invalid or quantity non-positive. Possible error codes:
            `inventory.invalid_body`, `inventory.empty_body`,
            `inventory.invalid_json`, `inventory.invalid_quantity`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `inventory.reserve` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Insufficient capacity available for the requested quantity
            (`inventory.over_capacity`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`inventory.reserve_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or inventory queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/events/{event_id}/sessions/{session_id}/inventory/release:
    post:
      operationId: releaseInventory
      summary: Release previously reserved capacity units
      description: |
        Atomically releases `quantity` previously-reserved capacity units
        back to available. Uses `SELECT ... FOR UPDATE` in a CTE to
        enforce `capacity_held >= quantity` atomically; returns 409
        `inventory.insufficient_held` when held is below the requested
        amount. Requires JWT + the `inventory.release` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: event_id
          in: path
          required: true
          description: UUIDv7 of the parent event.
          schema:
            type: string
            format: uuid
        - name: session_id
          in: path
          required: true
          description: UUIDv7 of the parent session.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryQuantityRequest"
            examples:
              releaseOne:
                summary: Release a single reserved unit
                value:
                  quantity: 1
              releaseBatch:
                summary: Release a batch of expired holds
                value:
                  quantity: 5
      responses:
        "200":
          description: |
            Held capacity successfully released; the envelope wraps the
            updated inventory ledger row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryEnvelope"
        "400":
          description: |
            Body invalid or quantity non-positive. Possible error codes:
            `inventory.invalid_body`, `inventory.empty_body`,
            `inventory.invalid_json`, `inventory.invalid_quantity`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `inventory.release` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Held capacity is less than the quantity to release
            (`inventory.insufficient_held`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`inventory.release_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or inventory queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/events/{event_id}/sessions/{session_id}/inventory/confirm:
