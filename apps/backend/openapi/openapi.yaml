          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Current state does not permit cancellation
            (`reservation.invalid_transition`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error. Possible codes:
            `reservation.get_failed`, `reservation.cancel_failed`,
            `reservation.commit_failed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
