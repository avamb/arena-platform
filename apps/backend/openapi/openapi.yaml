  /v1/organizations/{org_id}/promo-codes:
    post:
      operationId: createPromoCode
      summary: Create a promo code for an organization
      description: |
        Creates a promo code scoped to `org_id`. The `code` string is
        trimmed and must be unique within the organization; duplicates
        return 409 `promo.duplicate`. `discount_type` must be `percent`
        (1-100) or `fixed_amount`; `discount_value` must be > 0.

        Requires JWT + the `promo.create` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the organization that owns the promo code.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromoCodeRequest"
            examples:
              createPercentCode:
                summary: 25%-off code valid for the summer window
                value:
                  code: "SUMMER25"
                  discount_type: "percent"
                  discount_value: 25
                  applies_to_tier_ids: []
                  max_uses: 100
                  max_uses_per_customer: 1
                  valid_from: "2026-06-01T00:00:00Z"
                  valid_until: "2026-08-31T23:59:59Z"
                  min_order_amount: 5000
                  status: "active"
              createFixedAmountCode:
                summary: 1000 minor-units off, no usage caps
                value:
                  code: "WELCOME10"
                  discount_type: "fixed_amount"
                  discount_value: 1000
                  applies_to_tier_ids: []
                  min_order_amount: 0
      responses:
        "201":
          description: Promo code created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoCodeEnvelope"
        "400":
          description: |
            Invalid body or field. Possible error codes:
            `promo.invalid_body`, `promo.empty_body`,
            `promo.invalid_json`, `promo.invalid_code`,
            `promo.invalid_discount_type`,
            `promo.invalid_discount_value`,
            `promo.invalid_valid_from`, `promo.invalid_valid_until`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `promo.create` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            A promo code with the same `code` already exists in this
            organization (`promo.duplicate`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (`promo.insert_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or promo queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: listPromoCodes
      summary: List promo codes for an organization
      description: |
        Returns all promo codes for `org_id` ordered by the underlying
        query (typically `created_at DESC`). Soft-deleted rows are
        excluded.

