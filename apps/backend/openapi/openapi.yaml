          $ref: "#/components/schemas/PaginationMeta"

    GeoCountryResponse:
      type: object
      required: [id, iso2, iso3, slug, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: UUIDv7 primary key of the country row
          example: "01900000-0000-7000-8000-000000000010"
        iso2:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code
          example: "IL"
        iso3:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 3166-1 alpha-3 country code
          example: "ISR"
        slug:
          type: string
          description: URL-safe identifier slug
          example: "israel"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 / RFC 3339 timestamp of row creation
          example: "2024-01-01T00:00:00Z"

    GeoCityResponse:
      type: object
      required: [id, country_id, slug, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: UUIDv7 primary key of the city row
          example: "01900000-0000-7000-8000-000000000020"
        country_id:
          type: string
          format: uuid
          description: UUID of the parent country (FK → countries.id)
          example: "01900000-0000-7000-8000-000000000010"
        slug:
          type: string
          description: URL-safe identifier slug
          example: "tel-aviv"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 / RFC 3339 timestamp of row creation
          example: "2024-01-01T00:00:00Z"

    GeoCreateCountryRequest:
      type: object
      required: [iso2, iso3, slug]
