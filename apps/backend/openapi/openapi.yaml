          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error. Possible codes:
            `reservation.capacity_failed`, `reservation.insert_failed`,
            `reservation.commit_failed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Database pool or reservation queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

