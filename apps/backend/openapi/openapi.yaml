  /v1/organizations:
    post:
      operationId: postV1Organizations
      summary: Create a new organization
      description: |
        Creates a new organization (primary tenant boundary). Requires JWT authentication
        and the "org.create" permission. Name and slug must be unique among active
        (non-deleted) organizations.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                required: [organization]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
        "400":
          description: Request body missing, not valid JSON, or required fields empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.create)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: An organization with that name or slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: getV1Organizations
      summary: List all active organizations
      description: |
        Returns a JSON array of all active (non-soft-deleted) organizations ordered
        by creation time ascending. Requires JWT authentication and "org.read" permission.
      tags: [v1]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of active organizations
          content:
            application/json:
              schema:
                type: object
                required: [organizations]
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrganizationItem"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{id}:
    get:
      operationId: getV1OrganizationsId
      summary: Get a single organization by ID
      description: |
        Returns the details of a single active (non-deleted) organization.
        Requires JWT authentication and "org.read" permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the organization
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                required: [organization]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
        "400":
          description: id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or has been soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: patchV1OrganizationsId
      summary: Update an organization
      description: |
        Applies a partial update to an active organization. Empty or omitted fields
        leave the existing value unchanged. Requires JWT authentication and "org.update"
        permission. Returns 409 if the new name or slug conflicts with another active org.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the organization to update
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Organization updated successfully
          content:
            application/json:
              schema:
                type: object
                required: [organization]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
        "400":
          description: Request body missing, not valid JSON, or id path parameter invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.update)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or has been soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: New name or slug conflicts with an existing active organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteV1OrganizationsId
      summary: Soft-delete an organization
      description: |
        Marks an organization as deleted (sets deleted_at = now()). The row is not
        physically removed — it is excluded from all active-org queries. An audit event
        is written inside the same transaction. Requires JWT authentication and "org.delete"
        permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the organization to soft-delete
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization soft-deleted successfully
          content:
            application/json:
              schema:
                type: object
                required: [organization, deleted]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
                  deleted:
                    type: boolean
                    example: true
        "400":
          description: id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.delete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or already soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
