  /v1/organizations/{org_id}/events/{id}/status:
    post:
      operationId: updateEventStatus
      summary: Transition an event to a new lifecycle status
      description: |
        Validates and applies a status transition according to the event
        lifecycle (draft → published → cancelled|archived). Re-applying the
        same status is a no-op (HTTP 200). Owner-gated: org_id in the path
        must match the event's owning organization. Requires JWT + the
        `event.publish` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization.
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: UUIDv7 of the event.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventStatusRequest"
            examples:
              publish:
                summary: Publish a draft event
                value:
                  status: "published"
              cancel:
                summary: Cancel a published event
                value:
                  status: "cancelled"
      responses:
        "200":
          description: Status updated (or no-op when already in the target state).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventEnvelope"
        "400":
          description: |
            Body invalid or missing status. Possible error codes:
