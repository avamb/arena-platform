          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/checkout/{id}/tickets:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Checkout session UUID whose tickets to list.
    get:
      operationId: listCheckoutTickets
      summary: List tickets issued for a checkout session
      description: |
        Returns every ticket issued for the given checkout session in
        issuance order. Issuance is internal — tickets are created by
        the payment-intent webhook handler on `payment.succeeded` or by
        the free-checkout completion path, not via this endpoint. This
        route is purely a read.

        If the checkout session has no tickets (not yet completed, or
        issuance not yet performed) the response is an empty list.

        Requires JWT + the `ticket.read` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tickets for the checkout session (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
              examples:
                empty:
                  summary: No tickets issued yet for the session
                  value:
                    tickets: []
                twoTickets:
                  summary: Two tickets issued for a fixed-price tier
                  value:
                    tickets:
                      - id: "01929d0e-0e47-7000-8000-000000000801"
                        checkout_session_id: "018f4f00-0000-7000-8000-000000000020"
                        session_id: "01929d0e-0e47-7000-8000-000000000501"
                        tier_id: "01929d0e-0e47-7000-8000-000000000701"
                        holder_email: "buyer@example.com"
                        status: "active"
                        issued_at: "2026-06-30T12:00:00Z"
                        created_at: "2026-06-30T12:00:00Z"
                        updated_at: "2026-06-30T12:00:00Z"
                      - id: "01929d0e-0e47-7000-8000-000000000802"
                        checkout_session_id: "018f4f00-0000-7000-8000-000000000020"
                        session_id: "01929d0e-0e47-7000-8000-000000000501"
                        tier_id: "01929d0e-0e47-7000-8000-000000000701"
                        holder_email: "buyer@example.com"
                        status: "active"
                        issued_at: "2026-06-30T12:00:00Z"
                        created_at: "2026-06-30T12:00:00Z"
                        updated_at: "2026-06-30T12:00:00Z"
                gaTicketNoTier:
                  summary: One GA ticket (no tier association, no holder email)
                  value:
                    tickets:
                      - id: "01929d0e-0e47-7000-8000-000000000803"
                        checkout_session_id: "018f4f00-0000-7000-8000-000000000021"
                        session_id: "01929d0e-0e47-7000-8000-000000000502"
                        tier_id: null
                        holder_email: null
                        status: "active"
                        issued_at: "2026-06-30T12:00:00Z"
                        created_at: "2026-06-30T12:00:00Z"
                        updated_at: "2026-06-30T12:00:00Z"
        "400":
          description: |
            Path id is not a valid UUID (`ticket.invalid_checkout_id`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks the `ticket.read` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: |
            Internal server error while reading tickets
            (`ticket.list_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: |
            Ticket queries unavailable
            (`dependency.database_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/payment-intents:
    post:
      operationId: createPaymentIntent
      summary: Create a payment intent
      description: |
        Creates a new payment intent in the requested initial state
        (defaults to `created`). Optionally linked to a checkout
        session — when the payment later transitions to `succeeded`
        via webhook, tickets are issued for that session.

        Requires JWT + the `payment_intent.create` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentRequest"
            examples:
              createCreated:
                summary: Create an intent in the default `created` state
                value:
                  checkout_session_id: "018f4f00-0000-7000-8000-000000000020"
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  provider: "stripe"
                  amount: 5000
                  currency: "USD"
              createRequiresAction:
                summary: Create an intent that already needs 3DS
                value:
                  checkout_session_id: "018f4f00-0000-7000-8000-000000000021"
                  org_id: "018f4f00-0000-7000-8000-000000000003"
                  provider: "stripe"
                  provider_payment_id: "pi_3OqQ6vJk9z2c1abc"
                  amount: 12000
                  currency: "EUR"
                  initial_state: "requires_action"
                  sca_redirect_url: "https://hooks.stripe.com/3d_secure_2/hosted?merchant=acct_X"
                  client_secret: "pi_3OqQ6vJk9z2c1abc_secret_X"
      responses:
