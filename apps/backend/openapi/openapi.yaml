      operationId: getV1OrganizationsId
      summary: Get a single organization by ID
      description: |
        Returns the details of a single active (non-deleted) organization.
        Requires JWT authentication and "org.read" permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the organization
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                required: [organization]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
        "400":
          description: id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or has been soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: patchV1OrganizationsId
      summary: Update an organization
      description: |
        Applies a partial update to an active organization. Empty or omitted fields
        leave the existing value unchanged. Requires JWT authentication and "org.update"
        permission. Returns 409 if the new name or slug conflicts with another active org.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the organization to update
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Organization updated successfully
          content:
            application/json:
              schema:
                type: object
                required: [organization]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
        "400":
          description: Request body missing, not valid JSON, or id path parameter invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.update)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or has been soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: New name or slug conflicts with an existing active organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteV1OrganizationsId
      summary: Soft-delete an organization
      description: |
        Marks an organization as deleted (sets deleted_at = now()). The row is not
        physically removed — it is excluded from all active-org queries. An audit event
        is written inside the same transaction. Requires JWT authentication and "org.delete"
        permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the organization to soft-delete
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization soft-deleted successfully
          content:
            application/json:
              schema:
                type: object
                required: [organization, deleted]
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationItem"
                  deleted:
                    type: boolean
                    example: true
        "400":
          description: id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (org.delete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or already soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or org queries not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ─────────────────────────────────────────────────────────────────────────
  # Organization bank-accounts (Wave O / feature #255)
  # ─────────────────────────────────────────────────────────────────────────
  # Banking coordinates used for payouts, refunds, and tax-form rendering.
  # All four operations require the `org.update` permission on the parent
  # organization — these rows are sensitive financial data and are not
  # surfaced to actors with only `org.read`.

  /v1/organizations/{org_id}/bank-accounts:
    get:
      operationId: listOrganizationBankAccounts
      summary: List bank accounts for an organization
      description: |
        Returns every active bank-account row belonging to the org in
        the path, ordered by `is_primary DESC, created_at ASC`. Requires
        the `org.update` permission on the parent organization.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 primary key of the owning organization.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of active bank accounts
          content:
            application/json:
              schema:
                type: object
                required: [bank_accounts]
                properties:
                  bank_accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/BankAccountItem"
        "400":
          description: org_id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks `org.update` on the parent organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or has been archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createOrganizationBankAccount
      summary: Create a new bank account for an organization
      description: |
        Inserts a new bank-account row. At least one of `iban` or
        (`account_number` + `routing_number`) MUST be supplied. When
        `is_primary` is true, any previously primary bank account on
        the same organization is atomically demoted in the same
        transaction. Requires `org.update`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 primary key of the owning organization.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBankAccountRequest"
      responses:
        "201":
          description: Bank account created
          content:
            application/json:
              schema:
                type: object
                required: [bank_account]
                properties:
                  bank_account:
                    $ref: "#/components/schemas/BankAccountItem"
        "400":
          description: |
            Invalid body, missing identifier (neither IBAN nor
            account_number+routing_number supplied), invalid currency
            or country code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks `org.update` on the parent organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Organization not found or archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Duplicate identifier (IBAN or account_number+routing_number
            already exists on an active row for this organization).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/bank-accounts/{id}:
    patch:
      operationId: updateOrganizationBankAccount
      summary: Partially update a bank account
      description: |
        Patches the bank-account row in place. Omitted fields are left
        unchanged. Setting `is_primary` to true atomically demotes any
        previously primary account on the same organization. Setting
        `is_primary` to false while no other primary exists is
        rejected with 409 `bank_account.primary_required`. Requires
        `org.update`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBankAccountRequest"
      responses:
        "200":
          description: Bank account updated
          content:
            application/json:
              schema:
                type: object
                required: [bank_account]
                properties:
                  bank_account:
                    $ref: "#/components/schemas/BankAccountItem"
        "400":
          description: Invalid body or invalid path parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks `org.update`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Bank account not found, soft-deleted, or owned by another org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: |
            Conflict — duplicate identifier on the same org, or attempt
            to demote the only primary account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteOrganizationBankAccount
      summary: Soft-delete a bank account
      description: |
        Marks the bank account as deleted (sets `deleted_at = now()`)
        and writes an audit event in the same transaction. Soft-
        deleting the primary account on an organization that still has
        other active accounts requires the caller to designate a new
        primary in the same PATCH first; otherwise the request is
        rejected with 409 `bank_account.primary_required`. Requires
        `org.update`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Bank account soft-deleted
          content:
            application/json:
              schema:
                type: object
                required: [bank_account, deleted]
                properties:
                  bank_account:
                    $ref: "#/components/schemas/BankAccountItem"
                  deleted:
                    type: boolean
                    example: true
        "400":
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
