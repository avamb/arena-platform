  # ─────────────────────────────────────────────────────────────────────────
  # Venue admin endpoints (feature #124, contract documented under #235)
  # ─────────────────────────────────────────────────────────────────────────

  /v1/venues:
    get:
      operationId: getV1Venues
      summary: List all active venues across organizations
      description: |
        Returns every active (non-soft-deleted) venue across all organizations,
        ordered by creation time ascending. Requires JWT authentication and the
        "venue.read" permission. This is the shared cross-tenant read surface
        used by the SuperAdmin venue picker and global event-creation flows.
      tags: [v1]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of active venues
          content:
            application/json:
              schema:
                type: object
                required: [venues]
                properties:
                  venues:
                    type: array
                    items:
                      $ref: "#/components/schemas/VenueItem"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Venue queries unavailable (database not wired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/venues/{id}:
    get:
      operationId: getV1VenuesId
      summary: Get a single venue by ID
      description: |
        Returns a single active venue regardless of owning organization.
        Requires JWT authentication and the "venue.read" permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUIDv7 primary key of the venue
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Venue details
          content:
            application/json:
              schema:
                type: object
                required: [venue]
                properties:
                  venue:
                    $ref: "#/components/schemas/VenueItem"
        "400":
          description: id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Venue not found or has been soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Venue queries unavailable (database not wired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/venues:
    get:
      operationId: getV1OrganizationsOrgIdVenues
      summary: List active venues owned by a specific organization
      description: |
        Returns only the active venues whose owning org_id matches the
        path parameter. Requires JWT authentication and the "venue.read"
        permission. Used by the Admin UI venue list (per-org scope).
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of venues owned by the organization
          content:
            application/json:
              schema:
                type: object
                required: [venues]
                properties:
                  venues:
                    type: array
                    items:
                      $ref: "#/components/schemas/VenueItem"
        "400":
          description: org_id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Venue queries unavailable (database not wired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postV1OrganizationsOrgIdVenues
      summary: Create a new venue inside the given organization
      description: |
        Creates a venue owned by the org in the path. Owner-gated:
        every write enforces the org_id from the path against the venue's
        owning organization. Requires JWT authentication and the
        "venue.create" permission. Returns 409 if a venue with the same
        name already exists (active) inside the org.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVenueRequest"
      responses:
        "201":
          description: Venue created successfully
          content:
            application/json:
              schema:
                type: object
                required: [venue]
                properties:
                  venue:
                    $ref: "#/components/schemas/VenueItem"
        "400":
          description: Body missing/invalid, name empty, or city_id malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.create)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: A venue with that name already exists in this organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Semantically invalid V-1 field — currently emitted when the
            `timezone` value is not a recognised IANA time zone name
            (Go `time.LoadLocation` rejects it). The response uses
            the standard `ErrorEnvelope` with
            `error.code = "venue.invalid_timezone"` and
            `error.details.field = "timezone"`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or venue queries unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/venues/{id}:
    patch:
      operationId: patchV1OrganizationsOrgIdVenuesId
      summary: Update a venue owned by the organization
      description: |
        Applies a partial update to an active venue. Owner-gated: org_id in
        the path must match the venue's owning organization (a non-owner
        request resolves to 404). Empty or omitted fields leave the existing
        value unchanged. Requires JWT authentication and the "venue.update"
        permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: UUIDv7 of the venue to update
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVenueRequest"
      responses:
        "200":
          description: Venue updated successfully
          content:
            application/json:
              schema:
                type: object
                required: [venue]
                properties:
                  venue:
                    $ref: "#/components/schemas/VenueItem"
        "400":
          description: Body missing/invalid or city_id malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.update)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            Venue not found, has been soft-deleted, or is owned by a different
            organization (owner gate resolves to 404).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: New name conflicts with another active venue in the same org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Semantically invalid V-1 field — currently emitted when the
            `timezone` value is not a recognised IANA time zone name
            (Go `time.LoadLocation` rejects it). The response uses
            the standard `ErrorEnvelope` with
            `error.code = "venue.invalid_timezone"` and
            `error.details.field = "timezone"`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or venue queries unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteV1OrganizationsOrgIdVenuesId
      summary: Soft-delete a venue owned by the organization
      description: |
        Marks the venue as deleted (sets deleted_at = now()) and writes an
        audit event inside the same transaction. Owner-gated: non-owner
        requests resolve to 404. Requires JWT authentication and the
        "venue.delete" permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          description: UUIDv7 of the owning organization
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: UUIDv7 of the venue to soft-delete
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Venue soft-deleted successfully
          content:
            application/json:
              schema:
                type: object
                required: [venue, deleted]
                properties:
                  venue:
                    $ref: "#/components/schemas/VenueItem"
                  deleted:
                    type: boolean
                    example: true
        "400":
          description: id or org_id path parameter is not a valid UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Authorization header missing or JWT verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Actor does not hold the required permission (venue.delete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: |
            Venue not found, already soft-deleted, or owned by a different
            organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database pool or venue queries unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ─────────────────────────────────────────────────────────────────────────
  # Payment provider configs — feature #237
  # ─────────────────────────────────────────────────────────────────────────

  /v1/organizations/{org_id}/payment-configs:
    get:
      operationId: listPaymentProviderConfigs
      summary: List payment provider configs for an organization
      description: |
        Returns every active payment_provider_configs row belonging to the
        org in the path. Secrets are never included; only the keys with a
        non-empty value are surfaced through `secret_fields_set`. Requires
        the `payment_config.read` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of payment provider configs
          content:
            application/json:
              schema:
                type: object
                required: [payment_configs]
                properties:
                  payment_configs:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaymentProviderConfigItem"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createPaymentProviderConfig
      summary: Create a new payment provider config
      description: |
        Inserts a new payment_provider_configs row. The (org_id, provider,
        mode) tuple must be unique among active rows — 409 is returned
        otherwise. Status is derived automatically from the supplied secrets
        against the provider's required-secret catalogue. Requires the
        `payment_config.write` permission.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentProviderConfigRequest"
      responses:
        "201":
          description: Config created
          content:
            application/json:
              schema:
                type: object
                required: [payment_config]
                properties:
                  payment_config:
                    $ref: "#/components/schemas/PaymentProviderConfigItem"
        "400":
          description: Invalid body, missing/invalid provider, mode, or public_config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: A config for (org_id, provider, mode) already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/organizations/{org_id}/payment-configs/{id}:
    get:
      operationId: getPaymentProviderConfig
      summary: Get one payment provider config by id
      description: |
        Returns the matching active config row. 404 when the row does not
        exist, was soft-deleted, or belongs to a different organization.
        Requires `payment_config.read`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Config row
          content:
            application/json:
              schema:
                type: object
                required: [payment_config]
                properties:
                  payment_config:
                    $ref: "#/components/schemas/PaymentProviderConfigItem"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Caller lacks payment_config.read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found or owned by another org
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Database not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updatePaymentProviderConfig
      summary: Partially update a payment provider config
      description: |
        Patches the config in place. The `secrets` map is a per-key patch:
        non-empty values overwrite, empty-string values delete the secret,
        omitted keys are left untouched. The `status` column is recomputed
        from the post-patch secrets jsonb. Requires `payment_config.write`.
      tags: [v1]
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentProviderConfigRequest"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                type: object
                required: [payment_config]
                properties:
                  payment_config:
