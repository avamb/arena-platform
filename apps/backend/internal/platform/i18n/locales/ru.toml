# ru.toml — Russian message catalog for arena_new.
#
# Каждый ключ должен соответствовать ключу в en.toml.
# go-i18n/v2 автоматически откатывается к английскому (en.toml) для
# любого отсутствующего сообщения, поэтому неполные переводы безопасны.
#
# Структура каталога готова к добавлению uk и es: достаточно создать
# соответствующий .toml файл с теми же ключами.

["server.welcome"]
other = "Добро пожаловать на платформу Arena!"

["error.unauthorized"]
