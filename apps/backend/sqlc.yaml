version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/postgres/queries/"
    schema: "internal/migrations/sql/"
    gen:
      go:
        package: "gen"
        out: "internal/adapters/postgres/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
