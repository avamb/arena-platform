# ============================================================
# arena_new — local development stack
# ============================================================
# Core services (always started):
#   - postgres   : PostgreSQL 17 (source of truth)
#   - redis      : Redis 7 (locks / hot cache)
#   - api        : arena-api HTTP server  (port 8080)
#   - worker     : arena-worker background job dispatcher
#
# Observability stack (profile: observability):
#   - prometheus : Prometheus metrics scraper  (port 9090)
#   - grafana    : Grafana dashboards          (port 3000)
#
# One-shot tools (profile: tools):
#   - migrate    : arena-migrate database migration runner
#
# Usage:
#   # Start core services only
#   docker compose up -d
#
#   # Start core + observability
#   docker compose --profile observability up -d
#
#   # Run migrations
#   docker compose --profile tools run --rm migrate up
#
#   # Open Grafana
#   open http://localhost:3000   (admin / admin)
#
#   curl localhost:8080/healthz
#   curl localhost:8080/readyz
#   curl localhost:8080/metrics
# ============================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: arena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - "55432:5432"
    volumes:
      - arena_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: arena_redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - arena_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------------------------------------------------------------------
  # migrate : arena-migrate (one-shot). Brought up via
  #            `docker compose run --rm migrate up`  (or down/status/redo).
  #            Shares the same image as api/worker — only ENTRYPOINT differs.
  # ------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: arena_new/arena-api:dev
    container_name: arena_migrate
    profiles: ["tools"]   # never auto-starts; opt-in via `--profile tools` or `run`
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/arena-migrate"]
    environment:
      APP_ENV: development
      APP_NAME: arena-migrate
      APP_VERSION: 0.1.0-dev
      APP_COMMIT: local
      DATABASE_URL: "postgres://arena:arena@postgres:5432/arena?sslmode=disable"
      DB_POOL_MIN_CONNS: "1"
      DB_POOL_MAX_CONNS: "5"
      DEFAULT_LOCALE: "en"
      ACTIVE_LOCALES: "ru,en"
      LOG_LEVEL: "info"
      LOG_FORMAT: "text"
      # arena-migrate does not authenticate requests; explicitly disable the
      # dev stub auth boundary so config.Validate doesn't insist on a JWT
      # signing secret being present in the migrate container's env.
      ENABLE_DEV_AUTH: "false"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: arena_new/arena-api:dev
    container_name: arena_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_NAME: arena-api
      APP_VERSION: 0.1.0-dev
      APP_COMMIT: local

      HTTP_LISTEN_ADDR: ":8080"
      BODY_LIMIT_BYTES: "1048576"
      REQUEST_TIMEOUT_SECONDS: "30"
      CORS_ALLOWED_ORIGINS: "*"
      SHUTDOWN_TIMEOUT: "20s"

      DATABASE_URL: "postgres://arena:arena@postgres:5432/arena?sslmode=disable"
      DB_POOL_MIN_CONNS: "2"
      DB_POOL_MAX_CONNS: "20"
      DB_POOL_MAX_CONN_LIFETIME: "1h"
      DB_POOL_MAX_CONN_IDLE_TIME: "30m"
      # Mirror every SQL statement into the slog stream (feature #5 probe).
      # Production should keep this off; turn it on temporarily for live SQL
      # introspection without redeploying.
      DB_LOG_QUERIES: "true"

      REDIS_URL: "redis://redis:6379/0"

      DEFAULT_LOCALE: "en"
      ACTIVE_LOCALES: "ru,en"

      LOG_LEVEL: "info"
      LOG_FORMAT: "json"

      # Dev stub auth — replaced by real identity module in a later milestone.
      # Variable name is ENABLE_DEV_AUTH (matches config.Load lookup).
      ENABLE_DEV_AUTH: "true"
      JWT_SIGNING_SECRET: "dev-only-do-not-use-in-prod"
      JWT_ISSUER: "arena-dev"
      JWT_AUDIENCE: "arena-api"
      JWT_DEFAULT_TTL: "1h"
    ports:
      - "8080:8080"

  # ------------------------------------------------------------------
  # worker : arena-worker (long-running). Consumes worker_jobs rows
  #           inserted by api/migrate/tests, dispatches to registered
  #           handlers. Shares the api image; only ENTRYPOINT differs.
  # ------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: arena_new/arena-api:dev
    container_name: arena_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/arena-worker"]
    environment:
      APP_ENV: development
      APP_NAME: arena-worker
      APP_VERSION: 0.1.0-dev
      APP_COMMIT: local

      # arena-worker still loads the full config — including the HTTP
      # fields — because validation is shared with arena-api. The
      # listener never binds because the worker binary doesn't start
      # an HTTP server.
      HTTP_LISTEN_ADDR: ":0"
      BODY_LIMIT_BYTES: "1048576"
      REQUEST_TIMEOUT_SECONDS: "30"
      SHUTDOWN_TIMEOUT: "20s"

      DATABASE_URL: "postgres://arena:arena@postgres:5432/arena?sslmode=disable"
      DB_POOL_MIN_CONNS: "1"
      DB_POOL_MAX_CONNS: "10"
      DB_POOL_MAX_CONN_LIFETIME: "1h"
      DB_POOL_MAX_CONN_IDLE_TIME: "30m"
      DB_LOG_QUERIES: "false"

      # The shared image healthcheck defaults to arena-api on :8080. Worker
      # exposes its own /healthz on the metrics server instead.
      WORKER_METRICS_ADDR: ":9091"
      HEALTH_ADDR: "http://localhost:9091"

      DEFAULT_LOCALE: "en"
      ACTIVE_LOCALES: "ru,en"

      LOG_LEVEL: "info"
      LOG_FORMAT: "json"

      # The worker has no HTTP surface and does not validate JWTs;
      # explicitly disable the dev stub so config.Validate does not
      # insist on a signing secret being present.
      ENABLE_DEV_AUTH: "false"

  # ------------------------------------------------------------------
  # prometheus : scrapes /metrics from api (and worker when it exposes
  #              metrics). Opt-in via --profile observability.
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: arena_prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - arena_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # grafana : reads dashboards from ops/grafana/dashboards/ via
  #           provisioning. Default credentials: admin / admin.
  #           Opt-in via --profile observability.
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: arena_grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/arena_platform_overview.json
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - arena_grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  arena_pg_data:
  arena_redis_data:
  arena_prometheus_data:
  arena_grafana_data:
