# ============================================================
# arena_new — local development stack
# ============================================================
# Brings up:
#   - postgres : PostgreSQL 17 (source of truth)
#   - redis    : Redis 7 (locks / hot cache, not yet wired)
#   - api      : arena-api HTTP server
#
# `migrate` and `worker` services will be added once their
# binaries do real work (subsequent features). Their stubs
# already build cleanly inside the same image.
#
# Usage:
#   docker compose up -d postgres
#   docker compose up -d api
#   curl localhost:8080/healthz
#   curl localhost:8080/readyz
# ============================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: arena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - "55432:5432"
    volumes:
      - arena_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: arena_redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - arena_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: arena_new/arena-api:dev
    container_name: arena_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_NAME: arena-api
      APP_VERSION: 0.1.0-dev
      APP_COMMIT: local

      HTTP_LISTEN_ADDR: ":8080"
      BODY_LIMIT_BYTES: "1048576"
      REQUEST_TIMEOUT_SECONDS: "30"
      CORS_ALLOWED_ORIGINS: "*"
      SHUTDOWN_TIMEOUT: "20s"

      DATABASE_URL: "postgres://arena:arena@postgres:5432/arena?sslmode=disable"
      DB_POOL_MIN_CONNS: "2"
      DB_POOL_MAX_CONNS: "20"
      DB_POOL_MAX_CONN_LIFETIME: "1h"
      DB_POOL_MAX_CONN_IDLE_TIME: "30m"
      DB_LOG_QUERIES: "false"

      REDIS_URL: "redis://redis:6379/0"

      DEFAULT_LOCALE: "en"
      ACTIVE_LOCALES: "ru,en"

      LOG_LEVEL: "info"
      LOG_FORMAT: "json"

      # Dev stub auth — replaced by real identity module in a later milestone.
      ENABLE_STUB_AUTH: "true"
      JWT_SIGNING_SECRET: "dev-only-do-not-use-in-prod"
      JWT_ISSUER: "arena-dev"
      JWT_AUDIENCE: "arena-api"
      JWT_DEFAULT_TTL: "1h"
    ports:
      - "8080:8080"

volumes:
  arena_pg_data:
  arena_redis_data:
