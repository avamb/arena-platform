version: "2"
run:
  go: "1.24"
  allow-parallel-runners: true
linters:
  enable:
    - gosec
    - revive
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
    gosec:
      excludes:
        - G104
      config:
        global:
          audit: false
    govet:
      disable:
        # fieldalignment: cosmetic struct padding noise; we never reorder fields purely for byte alignment.
        - fieldalignment
        # shadow: flags the idiomatic Go pattern `if err := f(); err != nil { ... }` whenever an
        # outer `err` is in scope. The shadow analyzer is not enabled in stock `go vet` for this
        # reason. We intentionally use scoped `err` in if/for statements; broader misuse would be
        # caught by errcheck and code review.
        - shadow
      enable-all: true
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: unused-parameter
        - name: unreachable-code
        - name: error-return
        - name: error-strings
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - unused
        path: _test\.go$
      - linters:
          - govet
          - revive
        path: queries/.*\.go$
      - linters:
          - govet
          - revive
        path: openapi/.*\.go$
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/abhteam/arena_new
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - queries/.*\.go$
      - openapi/.*\.go$
