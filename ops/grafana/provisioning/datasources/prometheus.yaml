apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: arena_prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: "2.45.0"
      timeInterval: "15s"
    editable: false
