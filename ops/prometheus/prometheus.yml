global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development

scrape_configs:
  - job_name: arena-api
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: arena-worker
    static_configs:
      - targets: ['worker:9091']
    metrics_path: /metrics
    scrape_interval: 15s
