role_to_permission_matrix:
  matrix_note: >
    This matrix is a planning artifact. Use existing backend permissions where they
    already exist, and treat the network/operator items as explicit backend gaps
    until the repo grows a dedicated operator-network contract.
  platform_superadmin:
    permission_families:
      - platform.superadmin.read_all
      - platform.superadmin.write_all
      - platform.superadmin.manage_networks
      - platform.superadmin.manage_roles
      - platform.superadmin.manage_credentials
      - platform.superadmin.view_logs
      - platform.superadmin.view_sensitive_logs
      - platform.superadmin.impersonate_readonly
      - platform.superadmin.break_glass
      - membership.read
      - membership.grant
      - membership.revoke
      - org.read
      - org.write
      - event.write
      - order.read_all
      - refund.write
  platform_operator:
    permission_families:
      - membership.read
      - org.read
      - org.write_limited
      - event.read
      - event.write_limited
      - order.read
      - refund.read
      - report.read
      - audit.read_limited
  network_operator:
    permission_families:
      - network.read
      - network.manage_users
      - network.manage_organizers
      - network.manage_agents
      - network.manage_channels
      - network.view_sales
      - network.support_orders
      - network.support_tickets
      - network.support_refunds
      - network.view_reports
      - org.read_scoped
      - event.read_scoped
      - order.read_scoped
  organizer:
    permission_families:
      - org.read
      - org.write
      - event.read
      - event.write
      - venue.write
      - order.read_scoped
      - refund.read_scoped
      - report.read_scoped
      - membership.read
  agent:
    permission_families:
      - catalog.read
      - reservation.create
      - order.read_scoped
      - order.write_scoped
      - payment.read
      - refund.read_scoped
      - report.read_scoped
      - pos.execute
  external_ticketing_operator:
    permission_families:
      - integration.read
      - integration.sync
      - barcode.import
      - allocation.read
      - allocation.write
      - reconciliation.read
      - reconciliation.write
      - org.read_scoped

frontend_routes:
  - path: "/dashboard"
    module: dashboard
    pattern: "dashboard"
    default_scope: "current scope"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
      - agent
      - external_ticketing_operator
  - path: "/networks"
    module: networks
    pattern: "table/list view + detail drawer"
    default_scope: "platform or assigned network"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
  - path: "/organizations"
    module: organizations
    pattern: "table/list view + detail drawer"
    default_scope: "platform or network"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
  - path: "/users"
    module: users_access
    pattern: "table/list view + detail drawer"
    default_scope: "platform, assigned network, or self/profile"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
      - agent
      - external_ticketing_operator
    notes:
      - "For agent and external_ticketing_operator this is self/profile or scoped users only, not arbitrary user management."
      - "For platform roles and network_operator this can include managed users inside the active scope."
  - path: "/events"
    module: events_sessions
    pattern: "table/list view + detail drawer + wizard"
    default_scope: "organization"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
  - path: "/venues"
    module: venues_seating
    pattern: "table/list view + detail drawer + wizard"
    default_scope: "organization"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
  - path: "/orders"
    module: orders_tickets_refunds
    pattern: "table/list view + detail drawer"
    default_scope: "organization or agent"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
      - agent
      - external_ticketing_operator
  - path: "/reports"
    module: reports
    pattern: "table/list view"
    default_scope: "scope-aware"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
      - agent
      - external_ticketing_operator
  - path: "/channels"
    module: frontends_channels
    pattern: "table/list view + settings page"
    default_scope: "platform, network, or organization"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
      - external_ticketing_operator
  - path: "/payments"
    module: payments_fiscal
    pattern: "settings page"
    default_scope: "platform or organization"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - agent
  - path: "/pos"
    module: pos
    pattern: "pos mode"
    default_scope: "terminal or agent channel"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - agent
  - path: "/content"
    module: notifications_content
    pattern: "settings page"
    default_scope: "platform, network, or organization"
    visible_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
  - path: "/audit"
    module: audit_observability
    pattern: "table/list view + detail drawer"
    default_scope: "platform"
    visible_roles:
      - platform_superadmin
      - platform_operator
    notes:
      - "This route is platform audit only. External ticketing operators should use integration-scoped audit on their integration/detail screens, not this page."

backend_api_gaps:
  repo_state:
    existing:
      - "apps/backend/internal/platform/httpserver/superadmin.go exposes GET /v1/admin/organizations, /orders, /tickets, /refunds with X-Admin-Reason."
      - "apps/backend/internal/platform/httpserver/memberships.go exposes org membership grant/read/revoke endpoints."
      - "apps/backend/internal/migrations/sql/0011_memberships.sql seeds organizer, agent, platform_operator, external_ticketing_operator, platform_superadmin."
    missing_or_incomplete:
      - "network_operator is absent from membership role validation and seed data."
      - "operator_network CRUD and assignment endpoints do not exist yet."
      - "current-user / me endpoint that returns memberships, permissions, and available scopes is not present in the current source surface."
      - "scope-aware admin routes for network dashboards, network users, and network-scoped summaries are not present."
      - "a unified admin OpenAPI contract for the future web console is not present."
  notes:
    - "This is the place to distinguish repo-backed facts from legacy-doc inference."
    - "Do not treat the old Bil24 API doc as sufficient for the current backend contract."
    - "If a future agent finds additional admin routes or permission codes, it should extend this section instead of rewriting the legacy map."

modules:
  - id: dashboard
    target_name: "Dashboard"
    legacy_apps:
      - "TixManager"
      - "TixReporter"
    legacy_reference:
      - "manager_audit/current_state_overview.png"
      - "raw_misc/legacy_reporter_test_zone_2023.jpg"
    purpose: "Operational summary for the active scope."
    likely_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
      - organizer
      - agent
      - external_ticketing_operator
    likely_scopes:
      - platform
      - operator_network
      - organization
      - agent_channel
    modern_ui:
      - "KPI tiles for sales, orders, refunds, active events, and integration health."
      - "Warnings for queues, webhook failures, payment errors, and scanner sync issues."
      - "Role-specific shortcuts."
    workflow_shape:
      - "table/list view"
      - "detail drawer"
    mvp_priority: "P0"
    notes:
      - "Manager screenshots show a desktop-style admin shell; the modern dashboard should expose the same information density without the nested windows."
      - "Reporter capture is broad enough to infer operational summary patterns, but the exact KPI labels are not fully readable."

  - id: networks
    target_name: "Operator Networks"
    legacy_apps:
      - "TixManager"
    legacy_reference:
      - "manager_audit/09_frontends_operators.png"
      - "manager_audit/10_frontends_event_organizers.png"
      - "manager_audit/11_frontends_trusted_agents.png"
      - "manager_audit/14_frontends_agents.png"
    purpose: "Create and manage internal operator networks that bind organizers and agents."
    likely_roles:
      - platform_superadmin
      - platform_operator
      - network_operator
    likely_scopes:
      - platform
      - operator_network
    modern_ui:
      - "Network list with status, assigned operator users, organizers, agents, and sales volume."
      - "Network detail page with tabs: Overview, Operators, Organizers, Agents, Channels, Audit."
      - "Attach and detach organizers and agents with audit reason."
    workflow_shape:
      - "table/list view"
      - "detail drawer"
      - "settings page"
    mvp_priority: "P0"
    api_gap_notes:
      - "No legacy API endpoint in the source doc defines operator network CRUD; this is a new contract gap."
    notes:
      - "The legacy system exposes operators, organizers, and agents as separate frontends tabs rather than one network entity; the network model is a replacement abstraction, not a literal screen copy."

  - id: organizations
    target_name: "Organizations"
    legacy_apps:
      - "TixManager"
      - "TixEditor"
