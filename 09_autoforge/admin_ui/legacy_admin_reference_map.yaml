version: 2
purpose: >
  Structured reference map for replacing the legacy Bil24 four-application admin suite
  with one modern permission-filtered web backoffice.

principles:
  - Do not recreate four separate applications.
  - Use one admin shell with role and permission based navigation.
  - Treat screenshots as functional references, not visual design targets.
  - Preserve important workflows but modernize layout, copy, help, validation, and error handling.
  - Backend authorization must enforce every scope; UI filtering is not sufficient.
  - Prefer one modern admin app with role/scope switching over role-specific apps or duplicated shells.

legacy_sources:
  official_api_doc:
    path: "01_official_bil24_docs/api/bil24_app_api_2023.docx"
    notes:
      - "Documents old app roles: OPERATOR, AGENT, ORGANIZER."
      - "Documents old Editor, Reports, Manager, Cassa application endpoints."
      - "Shows AUTH/REFRESH/LOGOUT plus editor create/save flows, but not the modern admin contract."
  ticket_agent_notes:
    path: "01_official_bil24_docs/api/bil24_ticket_agent_api_notes_ru.md"
    notes:
      - "Agent is a sales partner interface with reservation, payment, order, cancel, and local mirror concerns."
  manager_audit:
    path: "04_legacy_screenshots/tix_manager/2026-06-11_manager_audit"
    notes:
      - "TixManager version 1.6 build 7921, test zone."
      - "Top tabs include Frontends, Acquiring, Fiscal data, Subscriptions, Widget, Notifications, News, MFC."
      - "Frontends subtabs include Operators, Event organizers, Trusted agents, Connections to ETS, Promotions, Agents."
  editor_audit:
    path: "04_legacy_screenshots/tix_editor/2026-06-12_editor_audit"
    notes:
      - "Event organizer oriented content and event setup surface."
      - "Includes country, city, venue, seating plan, categories, prices, media, sessions, sale windows, sync."
  cassa_audit:
    path: "04_legacy_screenshots/tix_cassa/2026-06-21_cassa_audit"
    notes:
      - "POS/cash desk workflow: auth, printer/template, shift, event selection, cart, payment, returns."
  misc_screens:
    path: "04_legacy_screenshots/raw_misc"
    notes:
      - "Mixed captures from legacy manager, editor, reporter, confirmation dialogs, category changes, and order pricing flows."
  architecture:
    paths:
      - "08_architecture/05_interface_taxonomy_and_complimentary_tickets_ru.md"
      - "08_architecture/08_platform_superadmin_observability_ru.md"
      - "09_autoforge/00_AGENT_GUARDRAILS.md"

target_shell:
  name: "Unified Admin Console"
  frontend_app_candidate: "apps/admin-web"
  navigation_style:
    - "Persistent sidebar grouped by domain."
    - "Global search/command palette."
    - "Scope switcher for platform, operator network, organization, and agent/channel context."
    - "Tables with saved filters and detail drawers."
    - "Wizards only for complex creation flows."
    - "Contextual hints, empty states, disabled-action reasons."

role_scope_guidance:
  platform_superadmin:
    scopes:
      - platform
      - operator_network
      - organization
      - agent_channel
      - pos_terminal
  platform_operator:
    scopes:
      - platform
      - operator_network
      - organization
  network_operator:
    scopes:
      - operator_network
      - organization
      - agent_channel
  organizer:
    scopes:
      - organization
      - event
      - venue
      - sessions
  agent:
    scopes:
      - agent_channel
      - orders
      - refunds
      - pos_terminal
  external_ticketing_operator:
    scopes:
      - platform
      - operator_network
      - organization
      - external_integration

workflow_patterns:
  table_list_view:
    use_for:
      - "Networks, organizations, users, channels, orders, tickets, reports, audit rows."
    cues:
      - "Frequent filtering, status inspection, and bulk navigation."
  detail_drawer:
    use_for:
      - "Organization details, network members, order/ticket drilldown, event metadata, payment provider records."
    cues:
      - "Need context without leaving the list; actions remain adjacent to the selected row."
  wizard:
    use_for:
      - "Event creation, venue setup, seat/quota setup, imports, and multi-step integration configuration."
    cues:
      - "Legacy screens used modal chains or giant forms with sequential dependencies."
  settings_page:
    use_for:
      - "Acquiring, fiscal data, widget/config, notifications, news, trusted agents, connections, and app-level preferences."
    cues:
      - "Mostly stateful configuration rather than entity browsing."
  pos_mode:
    use_for:
      - "Cash desk, shift start/close, event selection, add-to-cart, payment, returns."
    cues:
      - "Dense keyboard-first workflow that should live inside the same app shell."
  deferred_later:
    use_for:
      - "Full visual seating editor, advanced BI, richer offline POS hardening, and deep automation beyond current API coverage."
    cues:
      - "Legacy screenshots prove the workflow exists, but the current task should not overbuild it."

api_gap_notes:
  - "The legacy API doc only shows AUTH/REFRESH/LOGOUT plus editor create/save flows; it does not define the modern admin surface."
  - "No explicit modern endpoint is shown for current-user context, memberships, role/scope switching, or operator-network CRUD."
  - "No explicit endpoint is shown for list retrieval of orders, tickets, reports, audit logs, or support queues."
  - "No explicit endpoint is shown for unified POS actions, shift lifecycle, or refund orchestration."
  - "The editor doc collapses multiple dictionaries into GET_INIT_DATA; a modern app should split this into domain reads later, but that is an implementation gap note, not a design assumption."
  - "Event/session creation exists in the legacy API, but there is no explicit modern contract for venue/seat/quota management from the doc alone."

